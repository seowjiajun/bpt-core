environment = "backtest"

[simulation]
start              = "2026-01-06T00:00:00Z"
end                = "2026-01-12T23:59:59Z"
allow_partial_data = true

[simulation.latency]
cex_base_ms           = 2
hyperliquid_base_ms   = 200
hyperliquid_jitter_ms = 50

[data]
local_cache = "/opt/bpt/data/backtest-cache"

# Instruments must match exchange-native symbols in the Parquet files.
# They must also be a subset of what Fenrir's strategy is configured to trade.
[[instruments]]
exchange = "OKX"
symbol   = "BTC-USDT"

[endpoints]
binance_md_port    = 18100
okx_md_port        = 18101
binance_order_port = 18110
okx_order_port     = 18111

[aeron]
media_driver_dir = "/dev/shm/aeron-bpt"

[aeron.backtest_control]
channel   = "aeron:ipc"
stream_id = 9002

[aeron.backtest_ack]
channel   = "aeron:ipc"
stream_id = 9001

[logging]
level = "info"
dir   = "logs/backtest"

[metrics]
port = 9105
