# Instance config — QA environment (demo trading, testnet endpoints).
# Switch to bpt-md-gateway.prod.toml for live trading.
environment = "qa"
exchange_config = "config/exchanges/testnet.toml"
exchanges = ["OKX"]
subscription_heartbeat_interval_ms = 5000
service_heartbeat_interval_ms = 5000

[aeron]
media_driver_dir = "/dev/shm/aeron-bifrost"

[aeron.control]
channel = "aeron:ipc"
stream_id = 2001    # Fenrir → MD Gateway  (MdSubscribeBatch)

[aeron.data]
channel = "aeron:ipc"
stream_id = 2002    # MD Gateway → Fenrir  (MdMarketData, MdTrade)

[aeron.ack_hb]
channel = "aeron:ipc"
stream_id = 2003    # MD Gateway → Fenrir  (MdSubscriptionAck, heartbeats)

[metrics]
host = "0.0.0.0"  # Allow Prometheus to scrape from the monitoring host in QA
port = 9102

[logging]
level             = "info"
dir               = "logs"
flush_level       = "warn"
flush_interval_ms = 1000    # 1 s periodic flush for high-volume MD service
