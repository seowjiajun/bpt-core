# Exchange adapter endpoints — BACKTEST mode
# Points to Jormungandr's local WS servers instead of real exchanges.
# use_tls = false: Jormungandr serves plain TCP WebSocket (no TLS).

[[adapters]]
exchange             = "BINANCE"
ws_host              = "127.0.0.1"
ws_port              = "18100"
ws_path              = "/stream"
use_tls              = false
ws_read_timeout_ms   = 5000

[[adapters]]
exchange             = "OKX"
ws_host              = "127.0.0.1"
ws_port              = "18101"
ws_path              = "/ws/v5/public"
use_tls              = false
ws_read_timeout_ms   = 5000
