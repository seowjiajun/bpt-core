# Exchange adapter endpoints — HL MAINNET (recording-only).
#
# Used by recording-rig md-gateway instances to capture real mainnet ticks.
# Trading-side md-gateway should keep using exchanges/testnet.toml.
#
# This config has ONLY HYPERLIQUID — no other venues. Recording rigs are
# typically venue-specific so each can be tuned independently (rotation
# cadence, buffer size, symbol list).

[[adapters]]
exchange = "HYPERLIQUID"
ws_host = "api.hyperliquid.xyz"
ws_port = "443"
ws_path = "/ws"
use_tls = true
