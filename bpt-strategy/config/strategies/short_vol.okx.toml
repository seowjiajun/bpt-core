[fenrir.strategy]
type = "ShortVolStrategy"
enabled = true
instruments = []    # options discovered from VolSurface; perps resolved from Sindri snapshot
md_exchanges = ["OKX"]

[fenrir.strategy.venue_exec.OKX]
enabled = true
latency_budget_us = 5000
order_type = "LIMIT"
tif = "IOC"
max_retries = 3

[fenrir.strategy.risk]
max_position_usd = 5000.0
max_order_size_usd = 2500.0
max_daily_loss_usd = 200.0
max_open_orders = 20

[fenrir.strategy.schedule]
require_refdata_ready = true
md_staleness_threshold_ms = 5000
max_refdata_staleness_ns = 300000000000
configured_exchanges = ["OKX"]

[fenrir.strategy.params]
underlyings = ["BTC", "ETH"]

iv_rv_threshold = 0.05
iv_rv_exit_threshold = 0.02

min_abs_delta = 0.15
max_abs_delta = 0.50

min_time_to_expiry = 1.0     # days, converted to years internally
max_time_to_expiry = 30.0    # days, converted to years internally

max_portfolio_delta = 0.5
max_portfolio_vega = 10000.0
max_portfolio_gamma = 100.0

target_notional_usd = 1000.0

rv_window = 100
rv_sample_interval_s = 60.0

eval_interval_s = 5.0
aggress_bps = 5.0
