[fenrir.strategy]
type = "OFIStrategy"
enabled = true
# BTC perp on Hyperliquid testnet. OKX demo gates derivatives behind
# an accredited-investor tier in SG, so HL is the only venue where we
# can test OFI on a perp contract (OFI's home turf — fatter top-of-book
# and directional flow beat spot for a taker).
instruments = ["BTC/USD:PERPETUAL"]
md_exchanges = ["HYPERLIQUID"]

[fenrir.strategy.venue_exec.HYPERLIQUID]
enabled = true
latency_budget_us = 5000
# OFI fires aggressive LIMIT IOCs to cross the spread. HL supports
# IOC; TIF on stoikov is GTC since it posts, but we take.
order_type = "LIMIT"
tif = "IOC"
max_retries = 1

[fenrir.strategy.risk]
# Conservative for first HL paper session, same envelope as OKX v3
# so the two venues are comparable at the signal level.
max_position_usd = 500.0
max_order_size_usd = 250.0
max_daily_loss_usd = 200.0
max_open_orders = 2

[fenrir.strategy.schedule]
require_refdata_ready = true
md_staleness_threshold_ms = 10000
max_refdata_staleness_ns = 300000000000
configured_exchanges = ["HYPERLIQUID"]

[fenrir.strategy.params]
# ── OFI signal — same v3 params as ofi.okx ────────────────────────
# Keep identical so any difference in markouts is attributable to
# venue/instrument, not signal config.
book_levels      = 5
ofi_window_ms    = 1000
order_book_depth = 5

entry_threshold  = 1.0
exit_threshold   = 0.4

# ── Risk per position — v3 (price-stops disabled) ─────────────────
# Time-stop only; let the max_hold exit decide. OKX v2 analysis
# showed price stops whipsawing during fast moves and walking the
# book on IOC covers. Start clean on HL.
stop_bps         = 0
target_bps       = 0
max_hold_seconds = 30
cooldown_ticks   = 40

# ── Execution gates ───────────────────────────────────────────────
qty_usd          = 200
max_spread_bps   = 5

# Volatility halt: skip entries during fast moves. See ofi.okx.toml
# for full explanation.
vol_gate_max_bps   = 10.0
vol_gate_window_ms = 1000
vol_gate_halt_ms   = 5000
