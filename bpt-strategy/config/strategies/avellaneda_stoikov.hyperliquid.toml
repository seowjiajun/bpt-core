[fenrir.strategy]
type = "AvellanedaStoikovStrategy"
enabled = true
# Paper-mode XMR on HL: AS is fee-starved on BTC spot/perp (pro-MM
# competition + tight spread vs fee floor), but HL's XMR perp has a
# ~7 bps baseline spread = 2.3x the ~3 bps round-trip maker fee, with
# $10M/day volume — enough signal to see if AS captures markout.
# See monitoring/notes or chat log for the HL market scan that picked
# this symbol.
instruments = ["XMR/USD:PERPETUAL"]
md_exchanges = ["HYPERLIQUID"]

# Tier-2 paper mode: orders route to in-process PaperOrderGatewayClient
# + PaperFillEngine; HL is never touched. Still gets real HL market
# data + real refdata + real AccountSnapshot (for reconcile baseline),
# so signals are live. First test of AS on a market where spread
# economics actually work.
paper_mode = true

[fenrir.strategy.venue_exec.HYPERLIQUID]
enabled = true
latency_budget_us = 5000
order_type = "LIMIT"
tif = "GTC"
max_retries = 3

[fenrir.strategy.risk]
max_position_usd = 1000.0
max_order_size_usd = 100.0
max_daily_loss_usd = 200.0
max_open_orders = 10

[fenrir.strategy.schedule]
require_refdata_ready = true
md_staleness_threshold_ms = 10000
max_refdata_staleness_ns = 300000000000
configured_exchanges = ["HYPERLIQUID"]

[fenrir.strategy.params]
# MM-style rolling inventory horizon — 1h, not 24h. In AS the term
# γ·σ²·(T-t)/2 dominates the half-spread; T=86400 blows quotes out
# to 15x the market spread on any reasonable σ. 3600 scales quotes
# back to market-realistic half-spreads without losing the
# inventory-penalty intent.
gamma = 0.05
kappa = 5.0
session_duration_s = 3600

vol_halflife_s = 60.0
vol_warmup_ticks = 20

kappa_halflife_s = 45.0
kappa_warmup_ticks = 10
kappa_min = 0.01

# Paper-mode XMR sizing (HL mainnet XMR ~ $370, 7 bps baseline spread).
# 0.1 XMR = ~$37 notional per order; max_inventory 1.0 XMR = ~$370.
# Scale is symbolic since paper — what matters is the ratio order_qty
# to max_inventory (~10x) so the strategy has room to skew before
# hitting the cap.
order_qty = 0.1
# Half-spread of XMR baseline (3.5 bps) — trigger requote when our
# quote has drifted half a spread off the market. Matches typical
# practice of "requote when meaningful price move but not every tick".
requote_threshold = 0.00035
max_inventory = 1.0
# Unlike BTC spot where pro MMs pin the touch at 1 tick (0.14 bps),
# XMR on HL has a 7 bps natural spread with fewer participants — a
# 0.1 bps floor lets the AS formula pick the half-spread; gamma and
# kappa provide the real backstop.
min_half_spread_bps = 0.1

# ── Drift / momentum defence (Cartea-Jaimungal extension) ────────
# Estimates signed drift µ via EWMA of normalized log returns (same
# machinery as σ², but without squaring). Two effects:
#
# 1. Reservation price shift: r = s + µ*(T-t) - q*γ*σ²*(T-t)
#    In an uptrend (µ>0), quotes lean upward — harder to accumulate
#    short inventory, easier to accumulate long. Always active.
#
# 2. Side suppression: when |µ| > drift_suppress_bps, cancel and
#    refuse to post on the adverse side entirely (don't sell into an
#    uptrend, don't buy into a downtrend). 0 disables suppression.
#
# 15s drift halflife reacts faster than vol (60s) — trends establish
# quickly, and we'd rather suppress too early than too late.
# XMR baseline spread is 7 bps — a 5 bps/√s sustained drift is a real
# momentum event against a 3.5 bps half-spread; below that it's noise.
# (BTC tuning was 1.5 bps against 0.14 bps baseline — same ratio.)
drift_halflife_s    = 15.0
drift_suppress_bps  = 5.0

# ── Tyr toxicity feedback (optional) ──────────────────────────────
# When tyr is running and fenrir subscribes to stream 5001 (set
# [aeron.toxicity] stream_id = 5001 in the instance config), AS
# receives live per-side toxicity scores. When a side's score drops
# below tyr_suppress_threshold, that side is suppressed.
# 0 disables tyr-based suppression even if the stream is connected.
# Typical value: -2.0 (suppress when 5s markout is -2bps or worse).
tyr_suppress_threshold = -2.0

# ── Volatility halt ───────────────────────────────────────────────
# Addresses the pathology we observed live: stoikov got stuck with
# 0.088 BTC inventory after vol spiked and its quotes were picked off
# faster than the AS model could widen them. The gate watches a 1s
# rolling window and, if mid moves >N bps within it, cancels live
# quotes and pauses for halt_ms before re-quoting. Zero disables.
#
# XMR is more volatile than BTC in bps terms (altcoin amplitude).
# 20 bps / 1s is 5-7x the typical tick move — still a flash event,
# but scaled to XMR's noise level. A BTC-tuned 8 bps threshold would
# fire constantly on XMR and never let the quoter run.
vol_gate_max_bps    = 20.0
vol_gate_window_ms  = 1000
vol_gate_halt_ms    = 5000
