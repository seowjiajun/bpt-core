[fenrir.strategy]
type = "AvellanedaStoikovStrategy"
enabled = true
# Paper-mode XMR on HL: AS is fee-starved on BTC spot/perp (pro-MM
# competition + tight spread vs fee floor), but HL's XMR perp has a
# ~7 bps baseline spread = 2.3x the ~3 bps round-trip maker fee, with
# $10M/day volume — enough signal to see if AS captures markout.
# See monitoring/notes or chat log for the HL market scan that picked
# this symbol.
instruments = ["XMR/USD:PERPETUAL"]
md_exchanges = ["HYPERLIQUID"]

[fenrir.strategy.venue_exec.HYPERLIQUID]
enabled = true
latency_budget_us = 5000
order_type = "LIMIT"
tif = "GTC"
max_retries = 3

[fenrir.strategy.risk]
max_position_usd = 1000.0
max_order_size_usd = 100.0
max_daily_loss_usd = 200.0
max_open_orders = 10

[fenrir.strategy.schedule]
require_refdata_ready = true
md_staleness_threshold_ms = 10000
max_refdata_staleness_ns = 300000000000
configured_exchanges = ["HYPERLIQUID"]

[fenrir.strategy.params]
# MM-style rolling inventory horizon — 1h, not 24h. In AS the term
# γ·σ²·(T-t)/2 dominates the half-spread; T=86400 blows quotes out
# to 15x the market spread on any reasonable σ. 3600 scales quotes
# back to market-realistic half-spreads without losing the
# inventory-penalty intent.
gamma = 0.05
# κ=5 put the AS (1/γ)ln(1+γ/κ) floor at ~5.16 bps per side, wider than
# XMR's ~3.5 bps market half-spread — we sat BEHIND the touch and only
# caught adverse sweeps. κ=15 drops the floor to ~1.72 bps per side
# (inside the touch). κ EMA can still drift down from observed fill
# intensity; kappa_min=5 keeps a no-fill session from death-spiralling
# back out to 5+ bps.
kappa = 15.0
session_duration_s = 3600

vol_halflife_s = 60.0
vol_warmup_ticks = 20

kappa_halflife_s = 45.0
kappa_warmup_ticks = 10
kappa_min = 5.0

# Absolute upper clamp on half-spread. Belt-and-suspenders — if vol
# or inventory skew ever push AS output past this, clip rather than
# post an embarrassing quote. Originally 5 bps/side to sit inside the
# ~7 bps XMR touch, but in an adverse-selection trend AS *wants* to
# widen to protect, and the 5 bps clamp stops it. Bumped to 12 bps —
# drift/tyr/vol_gate still cap real-world behaviour at saner levels;
# this is just a last-resort ceiling, not the operating point.
max_half_spread_bps = 12.0

# Paper-mode XMR sizing (HL mainnet XMR ~ $370, 7 bps baseline spread).
# 0.1 XMR = ~$37 notional per order; max_inventory 1.0 XMR = ~$370.
# Scale is symbolic since paper — what matters is the ratio order_qty
# to max_inventory (~10x) so the strategy has room to skew before
# hitting the cap.
order_qty = 0.1
# Half-spread of XMR baseline (3.5 bps) — trigger requote when our
# quote has drifted half a spread off the market. Matches typical
# practice of "requote when meaningful price move but not every tick".
requote_threshold = 0.00035
max_inventory = 1.0

# Equity-fraction sizing — overrides order_qty / max_inventory above
# when set. Notional sizes derived from AccountSnapshot.totalEquity each
# tick; lets one config track capital changes (deposits, P&L) without
# manual re-sizing. order_qty_min is an absolute floor that prevents
# a shrinking equity from driving qty below the exchange lot size and
# stranding the position un-unwindable.
#
# Tuning at $686 starting equity / $377 XMR mid:
#   order_qty_fraction     = 0.05  → ~0.09 XMR (~$34 notional, similar
#                                    to today's static 0.1)
#   order_qty_min          = 0.05  → never below ~$19 notional
#   max_inventory_fraction = 0.5   → ~0.91 XMR cap (similar to static 1.0)
order_qty_fraction      = 0.05
order_qty_min           = 0.05
max_inventory_fraction  = 0.5
# Bumped 2026-04-25 from 0.1 → 2.0. Refdata reports tick=0 for XMR
# (real fix is in refdata's HL meta lookup), so AS doesn't tick-round
# and emits 6-decimal prices that HL then quantizes server-side. The
# prior 0.1 bps floor (~$0.038 at $377) was SMALLER than HL's implicit
# ~$0.01 tick — effective on-the-wire spread collapsed below tick,
# producing same-price round-trips on the dashboard and ~$0.01/fill
# of leakage. 2.0 bps forces total spread ≥ ~$0.15 (~15 ticks),
# guaranteeing visible separation. Reconsider once refdata tick is
# populated correctly.
#
# Original rationale (kept for context):
#   "Unlike BTC spot where pro MMs pin the touch at 1 tick (0.14 bps),
#   XMR on HL has a 7 bps natural spread with fewer participants — a
#   0.1 bps floor lets the AS formula pick the half-spread; gamma and
#   kappa provide the real backstop."
min_half_spread_bps = 2.0

# ── Drift / momentum defence (Cartea-Jaimungal extension) ────────
# Estimates signed drift µ via EWMA of normalized log returns (same
# machinery as σ², but without squaring). Two effects:
#
# 1. Reservation price shift: r = s + µ*(T-t) - q*γ*σ²*(T-t)
#    In an uptrend (µ>0), quotes lean upward — harder to accumulate
#    short inventory, easier to accumulate long. Always active.
#
# 2. Side suppression: when |µ| > drift_suppress_bps, cancel and
#    refuse to post on the adverse side entirely (don't sell into an
#    uptrend, don't buy into a downtrend). 0 disables suppression.
#
# 15s drift halflife reacts faster than vol (60s) — trends establish
# quickly, and we'd rather suppress too early than too late.
# XMR baseline spread is 7 bps. Initially tuned 5 bps/√s but live
# trending move on 2026-04-23 cleared only ~3.5 bps/√s — just under
# the floor — and we accumulated -0.95 XMR short before anything
# tripped. 3 bps/√s catches those before inventory builds; σ-mult
# companion (below) still dominates in high-vol regimes.
drift_halflife_s    = 15.0
drift_suppress_bps  = 3.0
# σ-multiple adaptive companion. Effective threshold each tick:
#   max(drift_suppress_bps, drift_suppress_sigma_mult × σ_ewma_bps)
# 3.0 ≈ "fire on 3-SD-per-√s moves." Lets the same config target
# different vol regimes without re-tuning the bps floor; the floor
# stays as a hard minimum.
#
# Halved 2026-04-25 from 3.0 → 1.5 because we flipped fair_value mode
# to micro. Micro-price already responds to top-of-book imbalance, and
# drift_α responds to the same signal over a window. Keeping both at
# original weight double-counts and over-tilts the reservation price —
# observed live on the soak: AS scaled to 0.75 long then 0.94 short
# within an hour, ~$0.91 of realized losses from forced unwinds at
# the inventory cap. Halving is the conservative first cut.
drift_suppress_sigma_mult = 1.5

# ── Slow-drift (trend) suppression ─────────────────────────────────
# Complements the per-√s drift EWMA above. Same wrong-side logic —
# suppress the inventory-adverse side in a trending market — but keyed
# on cumulative return over a rolling anchor window rather than per-√s
# normalized return. Targets sustained slow bleeds that the fast EWMA
# misses because their per-second rate is too small to clear
# drift_suppress_bps.
#
# Motivating case (2026-04-22): 2% XMR decline over ~34 min registered
# as ~0.1 bps/√s on the fast EWMA — well below the 5 bps/√s threshold —
# so drift_suppress_bids never fired. Meanwhile AS kept quoting bids
# into every tick down and accumulated ~1.64 XMR short via adverse
# selection. That same move = ~60 bps over a 5-min window → clearly
# trips a 20 bps threshold here.
#
# Tuning knobs:
#   slow_drift_window_s    — window length in seconds. Shorter → more
#                             reactive + noisier; longer → slower but
#                             more stable. Initially 300s, tightened to
#                             120s after an adverse trend rolled off
#                             the 5min window before triggering.
#   slow_drift_suppress_bps — threshold on |cum_return| over the window.
#                             Set 2-3× typical noise-band over the same
#                             window. 0 disables. For HL XMR where noise
#                             is ~5-10 bps / 2min, 20 bps still gives
#                             clean separation.
slow_drift_window_s     = 120.0
slow_drift_suppress_bps = 20.0
# σ-multiple adaptive companion. Effective threshold:
#   max(slow_drift_suppress_bps, k × σ_bps × √window_s)
# At 300s window the √window factor is ~17.3, so sigma_mult = 3
# fires at roughly 3 SDs of expected window-cumulative move — matching
# the fast drift's k value for consistency. Floor at 20 bps keeps the
# adaptive part from going below the manually-validated XMR threshold.
slow_drift_suppress_sigma_mult = 3.0

# ── Analytics toxicity feedback (optional) ────────────────────────
# When bpt-analytics is running and the strategy subscribes to stream
# 5001 (set [aeron.toxicity] stream_id = 5001 in the instance config),
# AS receives live per-side toxicity scores. When a side's score drops
# below tox_suppress_threshold, that side is suppressed.
# 0 disables tox-based suppression even if the stream is connected.
# Typical value: -2.0 (suppress when 5s markout is -2bps or worse).
tox_suppress_threshold = -2.0

# ── Volatility halt ───────────────────────────────────────────────
# Addresses the pathology we observed live: stoikov got stuck with
# 0.088 BTC inventory after vol spiked and its quotes were picked off
# faster than the AS model could widen them. The gate watches a 1s
# rolling window and, if mid moves >N bps within it, cancels live
# quotes and pauses for halt_ms before re-quoting. Zero disables.
#
# XMR is more volatile than BTC in bps terms (altcoin amplitude).
# 20 bps / 1s is 5-7x the typical tick move — still a flash event,
# but scaled to XMR's noise level. A BTC-tuned 8 bps threshold would
# fire constantly on XMR and never let the quoter run.
vol_gate_max_bps    = 20.0
vol_gate_window_ms  = 1000
vol_gate_halt_ms    = 5000
# σ-multiple adaptive companion to vol_gate_max_bps. Effective trip:
#   max(vol_gate_max_bps, k × σ_bps × √window_s)
# At 1s window, √window = 1, so sigma_mult ≈ k ≈ 5 fires at ~5σ-per-s
# moves — distinctly above the ~3σ drift/trend signals so vol_gate
# only catches genuine flash events, not gradient noise.
vol_gate_sigma_mult = 5.0

# ── γ feedback from recent realized P&L ───────────────────────────
# Closes the third feedback loop: γ widens after a recent loss streak,
# tightens after a recent profit streak. Otherwise stays in deadband
# (multiplier = 1.0). Highest blast-radius adaptive feature on AS —
# a mistuned widen_mult of 5x could lock the strategy into permanent
# wide quotes and never recover. Conservative defaults below.
#
# Window is in fill count, NOT time. 20 fills = ~5–10 minutes of
# trading on HL XMR at current fill cadence; long enough to smooth a
# single bad fill, short enough to react when something is actually
# trending wrong.
#
# Loss / profit thresholds are in USD (matches realized PnL units
# from PositionTracker — same currency as exchange equity reporting).
# At ~$30 notional per fill and ~7 bps spread, a "good" round-trip
# clears ~$0.02. Initial -$1 threshold was too slow — live run on
# 2026-04-23 accumulated -$0.52 rpnl while the multiplier sat at 1.0
# because the sum never crossed -$1. -$0.25 ≈ "3-4 consecutive small
# losers," widens γ quickly enough to matter. Profit threshold kept
# looser at +$1 — we want tightening to be earned, not reflexive.
gamma_pnl_window_n         = 20
gamma_pnl_loss_threshold_usd   = -0.25
gamma_pnl_profit_threshold_usd = 1.0
gamma_pnl_widen_mult       = 1.5
gamma_pnl_tighten_mult     = 0.85

# Drawdown circuit-breaker. When realized PnL drops below this absolute
# USD threshold (negative number), AS pauses both bid+ask for
# pause_cooldown_s before resuming. Per-instrument: only the breaching
# instrument pauses. Set to 0 (or positive) to disable.
#
# Initial value tuned from observed live behavior 2026-04-25: a single
# adverse cycle on XMR with mode=micro typically bleeds ~$0.05-0.20 of
# realized PnL before mean-reverting. -0.30 leaves headroom for normal
# oscillation but trips on the kind of sustained leak that destroyed
# the pre-hotfix run (-$0.91 in 30min). 5min cooldown gives the market
# time to flip regime — short enough to resume quickly, long enough
# that we're not just bleeding at half-rate.
#
# Must live BEFORE [fenrir.strategy.params.fair_value] table — TOML
# scopes any bare keys appearing after a [table] header to that table.
pause_below_rpnl_usd = -0.30
pause_cooldown_s     = 300.0

# Fair-value estimator for the AS reservation-price `s`.
# Modes: mid | micro | micro_capped | l2_weighted | ewma_micro
# Switched from mid → micro 2026-04-24: micro-price is closer to a true
# martingale than mid (Stoikov 2017), reducing adverse-selection on
# fills by weighting the price toward the thin side of the book.
[fenrir.strategy.params.fair_value]
mode = "micro"
