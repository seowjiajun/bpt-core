# Strategy params — BACKTEST mode, AS on HL APE.
# Adapted from avellaneda_stoikov.hyperliquid.toml. APE was selected from
# the HL universe scan as the only top-volume mainnet perp with median
# spread (~10 bps) wide enough to clear HL fees with margin for AS to make
# spread profit. Most other HL perps run sub-2bp spreads — too tight.

[strategy]
type = "AvellanedaStoikovStrategy"
enabled = true
instruments = ["XMR/USD:PERPETUAL"]
md_exchanges = ["HYPERLIQUID"]

[strategy.venue_exec.HYPERLIQUID]
enabled = true
latency_budget_us = 5000
order_type = "LIMIT"
tif = "GTC"
max_retries = 3

[strategy.risk]
max_position_usd = 1000.0
max_order_size_usd = 100.0
max_daily_loss_usd = 200.0
max_open_orders = 10

[strategy.schedule]
require_refdata_ready = true
md_staleness_threshold_ms = 10000
max_refdata_staleness_ns = 300000000000
configured_exchanges = ["HYPERLIQUID"]

[strategy.params]
gamma = 0.05
kappa = 15.0
session_duration_s = 3600

vol_halflife_s = 60.0
vol_warmup_ticks = 20

kappa_halflife_s = 45.0
kappa_warmup_ticks = 10
kappa_min = 5.0

max_half_spread_bps = 12.0

# XMR @ ~$400 mainnet price (vs APE @ $0.16). order_qty 0.2 XMR
# = ~$80 notional, fits under max_order_size_usd = $100. max_inventory
# 2.0 XMR = ~$800, fits under max_position_usd = $1000.
# Median spread observed ~3.7 bps (widest of HL PERPs we captured),
# vs APE's ~10 bps (but APE got eaten by adverse selection).
order_qty = 0.2
requote_threshold = 0.0005
max_inventory = 2.0

# Subscribe to L2 ladder (depth 5). Without this the HL decoder only
# publishes top-of-book BBO (enough for the strategy to quote) but never
# the full MdOrderBook the matching engine needs to seed queue position
# and produce fills — strategy quotes endlessly but books 0 fills. APE
# config carries the same line; it was missing here.
order_book_depth = 5

# Disabled in backtest — simulator pushes $0 starting balance so equity-fraction
# sizing collapses qty to 0. Use absolute order_qty / max_inventory above instead.
order_qty_fraction      = 0
order_qty_min           = 0.2
max_inventory_fraction  = 0
min_half_spread_bps     = 1.0

# Backtest knobs: real HL APE shows drift ≈ 6.7 bps/√s and σ² ≈ 1.6e-4
# at steady state, well above the prod 3.0 bps drift_suppress and the
# slow-drift 20.0 bps gate. The prod thresholds are calibrated for
# live use where staying out on adverse drift is the right call;
# here we deliberately loosen to validate pipeline mechanics
# (quotes, fills, fees, equity) on the data we have.
drift_halflife_s    = 15.0
drift_suppress_bps  = 50.0
drift_suppress_sigma_mult = 10.0

slow_drift_window_s     = 120.0
slow_drift_suppress_bps = 200.0
slow_drift_suppress_sigma_mult = 20.0

tox_suppress_threshold = -100.0

# Cold-start tolerance: real-time backtest replays 10ms apart, so a
# 1s window of fresh ticks routinely shows σ > 20 bps before the
# estimator settles. Wider band + zero halt lets AS quote during
# warmup. Live config (avellaneda_stoikov.hyperliquid.toml) keeps
# the prod thresholds.
vol_gate_max_bps    = 100.0
vol_gate_window_ms  = 1000
vol_gate_halt_ms    = 0
vol_gate_sigma_mult = 5.0

gamma_pnl_window_n             = 20
gamma_pnl_loss_threshold_usd   = -0.25
gamma_pnl_profit_threshold_usd = 1.0
gamma_pnl_widen_mult           = 1.5
gamma_pnl_tighten_mult         = 0.85

# Drawdown pause kept loose: tiny APE notional × maker fee accumulates
# to -$0.30 in ~45 fills, which would falsely halt the run. Push out
# of the way for backtest profile.
pause_below_rpnl_usd = -1000.0
pause_cooldown_s     = 300.0

[strategy.params.fair_value]
mode = "micro"
