[fenrir.strategy]
type = "HmmStrategy"
enabled = true
instruments = ["BTC/USDT:SPOT"]
md_exchanges = ["OKX"]

[fenrir.strategy.venue_exec.OKX]
enabled = true
latency_budget_us = 5000
order_type = "LIMIT"
tif = "GTC"
max_retries = 3

[fenrir.strategy.risk]
max_position_usd = 2000.0
max_order_size_usd = 500.0
max_daily_loss_usd = 200.0
max_open_orders = 20

[fenrir.strategy.schedule]
require_refdata_ready = true
md_staleness_threshold_ms = 5000
max_refdata_staleness_ns = 300000000000
configured_exchanges = ["OKX"]

[fenrir.strategy.params]
# ── HMM regime filter ────────────────────────────────────────────────
hmm_confidence = 0.60          # minimum posterior probability to confirm regime
hmm_min_dwell_bars = 5         # consecutive bars required before regime switch
ewma_lambda = 0.94             # RiskMetrics decay for per-bar vol estimation
bar_interval_s = 1.0           # bar width in seconds
order_book_depth = 5           # top-N order book levels (0 = BBO only)

# ── Momentum sub-strategy (TRENDING_UP / TRENDING_DOWN) ─────────────
ema_fast_period = 8
ema_slow_period = 21
atr_period = 14
atr_stop_mult = 1.5            # stop loss at 1.5× ATR from entry
atr_target_mult = 2.5          # take profit at 2.5× ATR from entry
momentum_qty_usd = 200.0

# ── VWAP reversion sub-strategy (MEAN_REVERT) ───────────────────────
vwap_deviation_atr = 1.2       # enter when price deviates 1.2× ATR from VWAP
vwap_close_atr = 0.3           # take profit at 0.3× ATR reversion
vwap_stop_atr = 2.0            # stop loss at 2.0× ATR adverse move
reversion_qty_usd = 200.0

# ── Market making sub-strategy / Avellaneda-Stoikov (HIGH_VOL) ───────
mm_gamma = 0.1                 # risk aversion parameter
mm_k = 1.5                     # fill rate / market impact parameter
mm_horizon_s = 3600.0          # trading session horizon (1 hour)
mm_qty_usd = 100.0
mm_max_inventory_usd = 500.0
mm_requote_ms = 200.0          # minimum time between requotes
mm_min_spread_bps = 2.0

# ── Execution ────────────────────────────────────────────────────────
aggress_bps = 0.5              # price improvement ticks for aggressive orders
max_spread_bps = 30.0          # skip quoting when spread exceeds this
