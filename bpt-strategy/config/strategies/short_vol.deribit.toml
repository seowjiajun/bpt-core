[fenrir.strategy]
type = "ShortVolStrategy"
enabled = true
instruments = []    # options discovered from VolSurface; perps resolved from Sindri snapshot
md_exchanges = ["DERIBIT"]

[fenrir.strategy.venue_exec.DERIBIT]
enabled = true
latency_budget_us = 10000    # Deribit WS latency can be higher
order_type = "LIMIT"
tif = "IOC"
max_retries = 3

[fenrir.strategy.risk]
max_position_usd = 100.0     # very conservative for testnet
max_order_size_usd = 50.0
max_daily_loss_usd = 50.0
max_open_orders = 10

[fenrir.strategy.schedule]
require_refdata_ready = true
md_staleness_threshold_ms = 10000
max_refdata_staleness_ns = 300000000000
configured_exchanges = ["DERIBIT"]

[fenrir.strategy.params]
underlyings = ["BTC", "ETH"]

# Signal thresholds — wide for testnet to actually trigger trades
iv_rv_threshold = 0.03
iv_rv_exit_threshold = 0.01

min_abs_delta = 0.10
max_abs_delta = 0.50

min_time_to_expiry = 1.0
max_time_to_expiry = 90.0    # wider for testnet — fewer expiries available

max_portfolio_delta = 0.5
max_portfolio_vega = 500.0
max_portfolio_gamma = 50.0

target_notional_usd = 50.0

rv_window = 10               # very small window for testnet testing
rv_sample_interval_s = 5.0   # sample every 5s for faster warmup

eval_interval_s = 10.0       # slower for testnet
aggress_bps = 10.0           # more aggressive to ensure fills
