# Momentum strategy tuned for backtest pipeline verification.
# BBO-driven (no trade data required) so it will fire orders even when the
# backtest cache has only orderbook snapshots.
#
# Trimmed to BTC-only since Jormungandr is configured to replay a single
# instrument.  The entry threshold is intentionally aggressive — the goal
# here is to exercise the order/exec/bridge plumbing, not to make money.

[fenrir.strategy]
type = "MomentumStrategy"
enabled = true
instruments = ["BTC/USDT:SPOT"]
md_exchanges = ["OKX"]

[fenrir.strategy.venue_exec.OKX]
enabled = true
latency_budget_us = 1000
order_type = "LIMIT"
tif = "IOC"
max_retries = 3

[fenrir.strategy.risk]
max_position_usd = 10000.0
max_order_size_usd = 1000.0
max_daily_loss_usd = 500.0
max_open_orders = 10

[fenrir.strategy.schedule]
require_refdata_ready = true
md_staleness_threshold_ms = 5000
max_refdata_staleness_ns = 300000000000
configured_exchanges = ["OKX"]

[fenrir.strategy.params]
lookback = 20
entry_threshold = 0.00001    # fires on almost any BBO move — for pipeline test only
cooldown_ms = 1000
