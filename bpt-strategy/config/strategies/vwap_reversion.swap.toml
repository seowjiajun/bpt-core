[fenrir.strategy]
type = "VwapReversionStrategy"
enabled = true
instruments = ["BTC/USDT:SWAP"]
md_exchanges = ["OKX"]

[fenrir.strategy.venue_exec.OKX]
enabled = true
latency_budget_us = 1000
order_type = "LIMIT"
tif = "GTC"
max_retries = 3

[fenrir.strategy.risk]
max_position_usd = 500.0
max_order_size_usd = 100.0
max_daily_loss_usd = 200.0
max_open_orders = 5

[fenrir.strategy.schedule]
require_refdata_ready = true
md_staleness_threshold_ms = 5000
max_refdata_staleness_ns = 300000000000
configured_exchanges = ["OKX"]

[fenrir.strategy.params]
vwap_window_trades = 200
min_trades_to_signal = 50
entry_threshold = 0.002      # 0.2% deviation from VWAP to enter
exit_threshold = 0.0005      # 0.05% reversion to exit
stop_threshold = 0.005       # 0.5% adverse move to stop out
cooldown_ms = 2000           # 2s between signals per instrument
