[fenrir.strategy]
type = "VwapReversionStrategy"
enabled = true
instruments = ["BTC/USDT:SPOT", "ETH/USDT:SPOT"]
md_exchanges = ["OKX"]

[fenrir.strategy.venue_exec.OKX]
enabled = true
latency_budget_us = 1000
order_type = "LIMIT"
tif = "IOC"    # IOC cancels if not immediately filled — avoids stale resting orders
max_retries = 3

[fenrir.strategy.risk]
max_position_usd = 10000.0
max_order_size_usd = 1000.0
max_daily_loss_usd = 500.0
max_open_orders = 10

[fenrir.strategy.schedule]
require_refdata_ready = true
md_staleness_threshold_ms = 5000
max_refdata_staleness_ns = 300000000000
configured_exchanges = ["OKX"]

[fenrir.strategy.params]
vwap_window_trades = 200
min_trades_to_signal = 20
entry_threshold = 0.00005    # lowered for testnet pipeline verification
exit_threshold = 0.0005
stop_threshold = 0.005
cooldown_ms = 2000
