[fenrir.strategy]
type = "AvellanedaStoikovStrategy"
enabled = true
instruments = ["BTC/USDT:SPOT"]
md_exchanges = ["OKX"]

[fenrir.strategy.venue_exec.OKX]
enabled = true
latency_budget_us = 1000
order_type = "LIMIT"    # AS posts resting orders — always LIMIT
tif = "GTC"             # GTC so the order sits in the book until cancelled
max_retries = 3

[fenrir.strategy.risk]
max_position_usd = 10000.0
max_order_size_usd = 1000.0
max_daily_loss_usd = 500.0
max_open_orders = 10

[fenrir.strategy.schedule]
require_refdata_ready = true
md_staleness_threshold_ms = 5000
max_refdata_staleness_ns = 300000000000
configured_exchanges = ["OKX"]

[fenrir.strategy.params]
# ── Avellaneda-Stoikov model parameters ─────────────────────────────
gamma = 0.3
kappa = 1.5
session_duration_s = 86400

# ── Volatility estimation (EWMA) ────────────────────────────────────
vol_halflife_s = 60.0
vol_warmup_ticks = 20

# ── Fill rate (κ) estimation (EWMA) ─────────────────────────────────
kappa_halflife_s = 45.0
kappa_warmup_ticks = 10
kappa_min = 0.01

# ── Quoting mechanics ────────────────────────────────────────────────
order_qty = 0.0001   # BTC; ~$7 notional at $70k/BTC — tiny so small testnet balances work
requote_threshold = 0.00005
max_inventory = 0.001
min_half_spread_bps = 1.5

# ── Order book depth ─────────────────────────────────────────────────
# 0 = BBO only (subscribes to OKX `bbo-tbt`).
# 1..5 = top-N levels from OKX `books5` — a FULL snapshot every 100ms.
# >5 = full depth from OKX `books` — delivered as SPARSE deltas (each
#     message carries only changed levels). Queue-aware quoting needs
#     stateful merging before that's usable, and the current parser
#     generates spurious BBO from `books` deltas (handle_book publishes
#     bids[0]/asks[0] of each delta as BBO, which is the top of the
#     DELTA not the top of the BOOK).
# Until the parser does proper delta-merging AND snapshot-aware BBO
# derivation (tracked as Phase 5 follow-up), cap at 5 so we stay on the
# snapshot channel.
order_book_depth = 5

# ── Drift / momentum defence ────────────────────────────────────
drift_halflife_s    = 15.0
drift_suppress_bps  = 1.5

# ── Tyr toxicity feedback ───────────────────────────────────────
tyr_suppress_threshold = -2.0

# ── Queue-position-based side suppression ───────────────────────
# Computed at quote time: fill_prob = our_qty / (our_qty + queue_ahead)
# where queue_ahead is bid_vol_above(candidate_px) + size_at(candidate_px).
# If projected fill_prob on a side falls below this floor, the side is
# suppressed (we don't quote there) — the order would sit so deep in the
# queue that its expected fill_prob doesn't cover the inventory risk of
# holding a stale quote.
#
# 0 disables the feature. Start conservative (0.001 = suppress when
# buried behind 1000× our own size); tighten to e.g. 0.01 once we have
# markout data to confirm deep-queue fills are negatively selected.
queue_suppress_fill_prob_min = 0.001

# ── Volatility halt ─────────────────────────────────────────────
vol_gate_max_bps    = 8.0
vol_gate_window_ms  = 1000
vol_gate_halt_ms    = 5000
