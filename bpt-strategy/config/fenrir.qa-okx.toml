environment = "qa"
strategy_config = "strategies/vwap_reversion.swap.toml"

[aeron]
media_driver_dir = "/dev/shm/aeron-bpt"

[aeron.refdata_control]
channel = "aeron:ipc"
stream_id = 1003    # fenrir -> refdata

[aeron.refdata_snapshot]
channel = "aeron:ipc"
stream_id = 1001    # refdata -> fenrir (filtered snapshot)

[aeron.refdata_delta]
channel = "aeron:ipc"
stream_id = 1002    # refdata -> fenrir (incremental updates)

[aeron.fee_schedule]
channel = "aeron:ipc"
stream_id = 1004    # refdata -> fenrir (FeeSchedule id=19)

[aeron.funding_rate]
channel = "aeron:ipc"
stream_id = 1005    # refdata -> fenrir (FundingRate id=18)

[aeron.refdata_status]
channel = "aeron:ipc"
stream_id = 1006    # refdata -> fenrir (RefDataReady id=16, RefDataError id=17)

[aeron.md_control]
channel = "aeron:ipc"
stream_id = 2001    # fenrir -> md service (MdSubscribeBatch)

[aeron.md_data]
channel = "aeron:ipc"
stream_id = 2002    # md service -> fenrir (MdMarketData, MdTrade)

[aeron.md_ack_hb]
channel = "aeron:ipc"
stream_id = 2003    # md service -> fenrir (acks, heartbeats)

[aeron.order]
channel = "aeron:ipc"
stream_id = 3001    # fenrir -> order-gateway (NewOrder, CancelOrder, CancelAll, ModifyOrder)

[aeron.exec_report]
channel = "aeron:ipc"
stream_id = 3002    # order-gateway -> fenrir (ExecutionReport)

[aeron.heartbeat]
channel = "aeron:ipc"
stream_id = 3003    # order-gateway -> fenrir (Order GatewayHeartbeat)

[aeron.account_snapshot]
channel = "aeron:ipc"
stream_id = 3004    # order-gateway -> fenrir (AccountSnapshot)

[fenrir]
correlation_id = 2001

[metrics]
port = 9104

[logging]
level             = "info"
dir               = "logs"
flush_level       = "warn"
flush_interval_ms = 0       # flush on warn+ only; set >0 for periodic flush in prod
