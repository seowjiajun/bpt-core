# BPT Transport MediaDriver Configuration

aeron:
  directory: "/dev/shm/aeron-bpt"
  threading_mode: "DEDICATED"   # SHARED, SHARED_NETWORK, DEDICATED
  idle_strategy: "BUSY_SPIN"    # BUSY_SPIN, YIELDING, SLEEPING, SLEEPING:<nanos>
  dir_delete_on_start: true
  dir_delete_on_shutdown: true

  heartbeat_interval_sec: 10
  # OKX WS reconnect takes ~8s (5s sleep + connect + SSL + WS handshake).
  # Default client liveness timeout (10s) is too tight — extend to 20s.
  # publicationUnblockTimeoutNs must be > clientLivenessTimeoutNs, so extend
  # that to 40s as well (Aeron default is 15s).
  client_liveness_timeout_ns: 20000000000
  publication_unblock_timeout_ns: 40000000000

logger:
  level: "info"

metrics:
  # 9100 is the conventional prometheus-node-exporter port and every
  # distro install binds it at boot. bpt-transport lost that race
  # pre-2026-04-21 and silently ran without a metrics server ("Address
  # already in use" in startup log). Move to 9110 — above the block
  # 9100-9106 reserved for bpt-* services.
  port: 9110

# CPU affinity for the DEDICATED-mode agent threads. -1 = unpinned (laptop
# default). On a real trading host, keep these core numbers coherent with
# bpt-core/deploy/topology/*.toml — the mdgw/ogw/strategy roles on that
# side and these aeron.{conductor,sender,receiver} roles together form the
# full-stack topology. Collisions (two bpt-core roles on the same core
# that's also listed here) aren't detected cross-process; the operator
# holds the full picture.
#topology:
#  conductor_core: 1
#  sender_core: 2
#  receiver_core: 3
