name: Release

on:
  push:
    branches: [main]

jobs:
  compile-check:
    name: Compile check (C++17)
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Compile generated headers
        run: |
          g++ -std=c++17 -Wall -Wextra -Werror \
              -I generated/cpp \
              ci/compile_check.cpp -o /dev/null

  release:
    name: Auto-tag and publish release
    runs-on: ubuntu-latest
    needs: compile-check
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0   # need full history to read tags

      - name: Bump patch version
        id: version
        run: |
          # Get latest vX.Y.Z tag; default to v0.0.0 if none exists
          LATEST=$(git tag --list 'v*.*.*' --sort=-version:refname | head -1)
          LATEST="${LATEST:-v0.0.0}"

          # Strip leading 'v' and split into parts
          VERSION="${LATEST#v}"
          MAJOR=$(echo "${VERSION}" | cut -d. -f1)
          MINOR=$(echo "${VERSION}" | cut -d. -f2)
          PATCH=$(echo "${VERSION}" | cut -d. -f3)

          NEW_TAG="v${MAJOR}.${MINOR}.$((PATCH + 1))"
          echo "tag=${NEW_TAG}" >> "${GITHUB_OUTPUT}"
          echo "Auto-bumped ${LATEST} -> ${NEW_TAG}"

      - name: Create and push tag
        env:
          NEW_TAG: ${{ steps.version.outputs.tag }}
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git tag "${NEW_TAG}"
          git push origin "${NEW_TAG}"

      - name: Package headers
        env:
          TAG: ${{ steps.version.outputs.tag }}
        run: |
          ARCHIVE="bifrost-protocol-${TAG}.tar.gz"

          tar -czf "${ARCHIVE}" \
            --transform "s|^|bifrost-protocol-${TAG}/|" \
            schema/ \
            generated/cpp/ \
            CMakeLists.txt \
            cmake/

          echo "ARCHIVE=${ARCHIVE}" >> "${GITHUB_ENV}"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.tag }}
          name: ${{ steps.version.outputs.tag }}
          body: |
            ## bifrost-protocol ${{ steps.version.outputs.tag }}

            ### What's included
            - `schema/` — SBE schema XML
            - `generated/cpp/` — C++ headers (`bifrost::protocol` namespace)
            - `CMakeLists.txt` + `cmake/` — INTERFACE library target `bifrost::protocol`

            ### Consuming via git submodule (recommended)
            ```bash
            git submodule add git@github.com:bishanparktrading/bifrost-protocol.git
            git submodule update --init
            ```
            Pin to this tag in your consuming repo's `.gitmodules`.

            ### Consuming via tarball
            Download `bifrost-protocol-${{ steps.version.outputs.tag }}.tar.gz`, extract, and point CMake at it:
            ```cmake
            add_subdirectory(path/to/bifrost-protocol)
            target_link_libraries(my_target PRIVATE bifrost::protocol)
            ```
          files: ${{ env.ARCHIVE }}
          fail_on_unmatched_files: true
