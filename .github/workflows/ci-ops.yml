name: ci-ops

on:
  pull_request:
    paths:
      - "bpt-ops/**"
      - ".github/workflows/ci-ops.yml"
  push:
    branches: [main]
    paths:
      - "bpt-ops/**"
      - ".github/workflows/ci-ops.yml"

defaults:
  run:
    working-directory: bpt-ops

jobs:
  lint-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - name: Install
        run: uv sync --extra dev

      - name: Ruff
        run: uv run ruff check .

      - name: Pytest
        run: uv run pytest
