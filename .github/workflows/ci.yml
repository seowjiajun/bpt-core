name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  # ── C++ services (CMake + vcpkg) ───────────────────────────────────────────
  cpp:
    name: C++ build & test
    runs-on: ubuntu-24.04

    env:
      VCPKG_ROOT: ${{ github.workspace }}/vcpkg
      VCPKG_DEFAULT_BINARY_CACHE: ${{ github.workspace }}/.vcpkg-cache

    steps:
      - uses: actions/checkout@v4

      # ── Restore all caches before any installation step ───────────────────
      # vcpkg installation itself — skip clone+bootstrap on hit.
      # Bump the key suffix (v1 → v2 etc.) to force a fresh vcpkg when needed.
      - name: Restore vcpkg
        uses: actions/cache@v4
        id: vcpkg-cache
        with:
          path: ${{ env.VCPKG_ROOT }}
          key: vcpkg-${{ runner.os }}-v1

      # Compiled vcpkg package archives — keyed on vcpkg.json so a dep change
      # triggers a full rebuild of only the changed packages.
      - name: Restore vcpkg binary packages
        uses: actions/cache@v4
        id: vcpkg-pkgs-cache
        with:
          path: ${{ env.VCPKG_DEFAULT_BINARY_CACHE }}
          key: vcpkg-pkgs-${{ runner.os }}-${{ hashFiles('vcpkg.json') }}
          restore-keys: vcpkg-pkgs-${{ runner.os }}-

      # Aeron + fast_float FetchContent — source + compiled artifacts.
      # Keyed on CMakeLists.txt so a version bump triggers a fresh fetch.
      - name: Restore FetchContent (Aeron + fast_float)
        uses: actions/cache@v4
        id: deps-cache
        with:
          path: build/_deps
          key: cmake-deps-${{ runner.os }}-${{ hashFiles('CMakeLists.txt') }}
          restore-keys: cmake-deps-${{ runner.os }}-

      # ── System packages ───────────────────────────────────────────────────
      - name: Install apt dependencies
        run: |
          sudo apt-get update -q
          sudo apt-get install -y --no-install-recommends \
            cmake ninja-build \
            gcc-13 g++-13 \
            libssl-dev pkg-config \
            curl wget

      # Arrow 16.x from the official Apache apt repo — matches local conda version.
      - name: Install Arrow & Parquet
        run: |
          wget -q https://apache.jfrog.io/artifactory/arrow/ubuntu/apache-arrow-apt-source-latest-noble.deb
          sudo apt-get install -y ./apache-arrow-apt-source-latest-noble.deb
          sudo apt-get update -q
          sudo apt-get install -y libarrow-dev libparquet-dev

      # ── vcpkg ─────────────────────────────────────────────────────────────
      - name: Bootstrap vcpkg
        if: steps.vcpkg-cache.outputs.cache-hit != 'true'
        run: |
          git clone https://github.com/microsoft/vcpkg.git "$VCPKG_ROOT" --depth 1
          "$VCPKG_ROOT/bootstrap-vcpkg.sh" -disableMetrics

      - name: Create vcpkg binary cache dir
        run: mkdir -p "$VCPKG_DEFAULT_BINARY_CACHE"

      # ── CMake ─────────────────────────────────────────────────────────────
      - name: Configure
        run: |
          cmake -B build -G Ninja \
            -DCMAKE_BUILD_TYPE=Debug \
            -DCMAKE_C_COMPILER=gcc-13 \
            -DCMAKE_CXX_COMPILER=g++-13 \
            -DCMAKE_TOOLCHAIN_FILE="$VCPKG_ROOT/scripts/buildsystems/vcpkg.cmake"

      # Save caches immediately after configure — before build can fail.
      # actions/cache/save is a no-op if the key already exists, so safe to
      # call unconditionally alongside the restore steps above.
      - name: Save vcpkg binary packages
        uses: actions/cache/save@v4
        if: always() && steps.vcpkg-pkgs-cache.outputs.cache-hit != 'true'
        with:
          path: ${{ env.VCPKG_DEFAULT_BINARY_CACHE }}
          key: vcpkg-pkgs-${{ runner.os }}-${{ hashFiles('vcpkg.json') }}

      - name: Save FetchContent (Aeron + fast_float)
        uses: actions/cache/save@v4
        if: always() && steps.deps-cache.outputs.cache-hit != 'true'
        with:
          path: build/_deps
          key: cmake-deps-${{ runner.os }}-${{ hashFiles('CMakeLists.txt') }}

      - name: Build
        run: cmake --build build -j$(nproc)

      - name: Test
        run: ctest --test-dir build --output-on-failure -j$(nproc)

  # ── Bifrost-fabric (Gradle / Java 17) ─────────────────────────────────────
  bifrost-fabric:
    name: Bifrost-fabric build & test
    runs-on: ubuntu-24.04

    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      # Gradle dependency cache — setup-gradle handles this automatically.
      - name: Setup Gradle cache
        uses: gradle/actions/setup-gradle@v3

      - name: Check formatting
        working-directory: bifrost/fabric
        run: ./gradlew spotlessCheck

      - name: Run tests
        working-directory: bifrost/fabric
        run: ./gradlew test

      - name: Build shadow JAR
        working-directory: bifrost/fabric
        run: ./gradlew shadowJar

      - name: Upload JAR artifact
        uses: actions/upload-artifact@v4
        with:
          name: bifrost-fabric-jar
          path: bifrost/fabric/build/libs/*-all.jar
