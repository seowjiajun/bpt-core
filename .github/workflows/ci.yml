name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

# Force JS actions onto Node 24 ahead of GitHub's Node 20 deprecation
# (effective 2026-06-02). Avoids per-action major-version bump churn until
# the marketplace catches up uniformly. Remove this block once all actions
# referenced in jobs natively support Node 24.
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'

# Cancel superseded PR runs (a force-push or new commit kills the older pipeline).
# Don't cancel on main — every push there should populate caches to completion.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  # ── Path filter ────────────────────────────────────────────────────────────
  # Decides which downstream jobs need to run based on what actually changed.
  # On push events, dorny/paths-filter compares against the previous commit;
  # on PR events, against the base branch. Both modes handle this correctly.
  changes:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    outputs:
      cpp: ${{ steps.filter.outputs.cpp }}
      transport: ${{ steps.filter.outputs.transport }}
      frontend: ${{ steps.filter.outputs.frontend }}
      sbe: ${{ steps.filter.outputs.sbe }}
    steps:
      - uses: actions/checkout@v4
      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            cpp:
              - 'bpt-*/**'
              - 'dashboard/bridge/**'
              - 'messages/**'
              - 'third_party/**'
              - 'config/instruments/**'
              - 'config/exchanges/**'
              - 'MODULE.bazel'
              - 'MODULE.bazel.lock'
              - '.bazelrc'
              - '.bazelignore'
              - '.github/workflows/ci.yml'
            transport:
              - 'transport/**'
              - '.github/workflows/ci.yml'
            frontend:
              - 'dashboard/frontend/**'
              - '.github/workflows/ci.yml'
            sbe:
              - 'messages/schema/**'
              - 'messages/scripts/**'
              - 'messages/generated/**'
              - '.github/workflows/ci.yml'

  # ── SBE schema ↔ generated-header drift check ──────────────────────────────
  # Catches "edit messages/schema/bpt-protocol.xml but forget to regenerate
  # the C++ headers" — a real foot-gun (the schema is the source of truth;
  # consumers compile against the committed generated/ files). Also catches
  # the inverse: hand-edits to generated/ that the next regen would clobber.
  #
  # The job re-runs messages/scripts/generate.sh against the schema in the
  # PR head and fails if `git diff` shows any change. generate.sh preserves
  # foreign headers (e.g. ExchangeRegistry.h, generated by a separate tool)
  # via a "Generated SBE" boilerplate heuristic, so the diff is purely
  # SBE-codec drift.
  sbe-drift:
    name: SBE schema ↔ generated headers drift
    needs: changes
    if: needs.changes.outputs.sbe == 'true'
    runs-on: ubuntu-24.04
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17 (needed for the SBE generator)
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Download SBE jar
        working-directory: messages
        run: ./scripts/download-sbe-tool.sh

      - name: Regenerate from schema
        working-directory: messages
        run: ./scripts/generate.sh

      - name: Assert no drift
        run: |
          if ! git diff --exit-code -- messages/generated/; then
            echo "::error::messages/generated/ is out of sync with messages/schema/bpt-protocol.xml."
            echo "Run: cd messages && ./scripts/generate.sh   then commit the regenerated files."
            exit 1
          fi

  # ── C++ services via Bazel (primary build) ─────────────────────────────────
  cpp-bazel:
    name: C++ build & test (Bazel)
    needs: changes
    if: needs.changes.outputs.cpp == 'true'
    runs-on: ubuntu-24.04
    timeout-minutes: 30

    steps:
      - uses: actions/checkout@v4

      - name: Set up Bazel with caching
        uses: bazel-contrib/setup-bazel@0.14.0
        with:
          bazelisk-cache: true
          disk-cache: true
          repository-cache: true
          external-cache: true

      - name: Install system deps (openssl headers for Bazel-built targets)
        run: |
          sudo apt-get update -q
          sudo apt-get install -y --no-install-recommends libssl-dev pkg-config

      - name: Bazel build //...
        run: bazel build //...

      - name: Bazel test //...
        run: bazel test //... --test_output=errors

  # ── Aeron media driver (Java / Gradle) ─────────────────────────────────────
  transport:
    name: Transport (Aeron MediaDriver, Java)
    needs: changes
    if: needs.changes.outputs.transport == 'true'
    runs-on: ubuntu-24.04
    timeout-minutes: 15

    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Gradle cache
        uses: gradle/actions/setup-gradle@v3

      - name: Check formatting
        working-directory: transport/aeron
        run: ./gradlew spotlessCheck

      - name: Run tests
        working-directory: transport/aeron
        run: ./gradlew test

      - name: Build shadow JAR
        working-directory: transport/aeron
        run: ./gradlew shadowJar

      - name: Upload JAR artifact
        uses: actions/upload-artifact@v4
        with:
          name: transport-jar
          path: transport/aeron/build/libs/*-all.jar

  # ── Dashboard frontend (TypeScript / Vite) ─────────────────────────────────
  frontend:
    name: Dashboard frontend (lint + build)
    needs: changes
    if: needs.changes.outputs.frontend == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 10

    defaults:
      run:
        working-directory: dashboard/frontend

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: dashboard/frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Build (tsc -b + vite build)
        run: npm run build
