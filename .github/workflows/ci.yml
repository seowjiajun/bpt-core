name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  # ── C++ services (CMake + vcpkg) ───────────────────────────────────────────
  cpp:
    name: C++ build & test
    runs-on: ubuntu-24.04

    env:
      VCPKG_ROOT: ${{ github.workspace }}/vcpkg
      VCPKG_DEFAULT_BINARY_CACHE: ${{ github.workspace }}/.vcpkg-cache

    steps:
      - uses: actions/checkout@v4

      - name: Install system dependencies
        run: |
          sudo apt-get update -q
          sudo apt-get install -y --no-install-recommends \
            cmake ninja-build \
            gcc-13 g++-13 \
            libssl-dev pkg-config \
            curl wget

          # Apache Arrow 16.x — matches the local dev version from conda.
          # Using the official Apache Arrow apt repo for ubuntu noble (24.04).
          wget -q https://apache.jfrog.io/artifactory/arrow/ubuntu/apache-arrow-apt-source-latest-noble.deb
          sudo apt-get install -y ./apache-arrow-apt-source-latest-noble.deb
          sudo apt-get update -q
          sudo apt-get install -y libarrow-dev libparquet-dev

      - name: Bootstrap vcpkg
        run: |
          git clone https://github.com/microsoft/vcpkg.git "$VCPKG_ROOT" --depth 1
          "$VCPKG_ROOT/bootstrap-vcpkg.sh" -disableMetrics

      - name: Restore vcpkg binary cache
        uses: actions/cache@v4
        with:
          path: ${{ env.VCPKG_DEFAULT_BINARY_CACHE }}
          key: vcpkg-${{ runner.os }}-${{ hashFiles('vcpkg.json') }}
          restore-keys: vcpkg-${{ runner.os }}-

      - name: Create vcpkg binary cache dir
        run: mkdir -p "$VCPKG_DEFAULT_BINARY_CACHE"

      - name: Restore CMake FetchContent cache
        uses: actions/cache@v4
        with:
          path: build/_deps
          key: cmake-deps-${{ runner.os }}-${{ hashFiles('CMakeLists.txt') }}
          restore-keys: cmake-deps-${{ runner.os }}-

      - name: Configure
        run: |
          cmake -B build -G Ninja \
            -DCMAKE_BUILD_TYPE=Debug \
            -DCMAKE_C_COMPILER=gcc-13 \
            -DCMAKE_CXX_COMPILER=g++-13 \
            -DCMAKE_TOOLCHAIN_FILE="$VCPKG_ROOT/scripts/buildsystems/vcpkg.cmake"

      - name: Build
        run: cmake --build build -j$(nproc)

      - name: Test
        run: ctest --test-dir build --output-on-failure -j$(nproc)

  # ── Bifrost-fabric (Gradle / Java 17) ─────────────────────────────────────
  bifrost-fabric:
    name: Bifrost-fabric build & test
    runs-on: ubuntu-24.04

    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Gradle cache
        uses: gradle/actions/setup-gradle@v3

      - name: Check formatting
        working-directory: bifrost/fabric
        run: ./gradlew spotlessCheck

      - name: Run tests
        working-directory: bifrost/fabric
        run: ./gradlew test

      - name: Build shadow JAR
        working-directory: bifrost/fabric
        run: ./gradlew shadowJar

      - name: Upload JAR artifact
        uses: actions/upload-artifact@v4
        with:
          name: bifrost-fabric-jar
          path: bifrost/fabric/build/libs/*-all.jar
