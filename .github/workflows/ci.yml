name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  # ── Path filter ────────────────────────────────────────────────────────────
  # Decides which downstream jobs need to run based on what actually changed.
  # On push events, dorny/paths-filter compares against the previous commit;
  # on PR events, against the base branch. Both modes handle this correctly.
  changes:
    runs-on: ubuntu-latest
    outputs:
      cpp: ${{ steps.filter.outputs.cpp }}
      backtester_cmake: ${{ steps.filter.outputs.backtester_cmake }}
      transport: ${{ steps.filter.outputs.transport }}
      frontend: ${{ steps.filter.outputs.frontend }}
      sbe: ${{ steps.filter.outputs.sbe }}
    steps:
      - uses: actions/checkout@v4
      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            cpp:
              - 'bpt-*/**'
              - 'dashboard/bridge/**'
              - 'messages/**'
              - 'third_party/**'
              - 'config/instruments/**'
              - 'config/exchanges/**'
              - 'MODULE.bazel'
              - 'MODULE.bazel.lock'
              - '.bazelrc'
              - '.bazelignore'
              - '.github/workflows/ci.yml'
            backtester_cmake:
              - 'bpt-backtester/**'
              - 'messages/**'
              - 'third_party/yggdrasil/**'
              - 'CMakeLists.txt'
              - 'vcpkg.json'
              - '.github/workflows/ci.yml'
            transport:
              - 'transport/**'
              - '.github/workflows/ci.yml'
            frontend:
              - 'dashboard/frontend/**'
              - '.github/workflows/ci.yml'
            sbe:
              - 'messages/schema/**'
              - 'messages/scripts/**'
              - 'messages/generated/**'
              - '.github/workflows/ci.yml'

  # ── SBE schema ↔ generated-header drift check ──────────────────────────────
  # Catches "edit messages/schema/bpt-protocol.xml but forget to regenerate
  # the C++ headers" — a real foot-gun (the schema is the source of truth;
  # consumers compile against the committed generated/ files). Also catches
  # the inverse: hand-edits to generated/ that the next regen would clobber.
  #
  # The job re-runs messages/scripts/generate.sh against the schema in the
  # PR head and fails if `git diff` shows any change. generate.sh preserves
  # foreign headers (e.g. ExchangeRegistry.h, generated by a separate tool)
  # via a "Generated SBE" boilerplate heuristic, so the diff is purely
  # SBE-codec drift.
  sbe-drift:
    name: SBE schema ↔ generated headers drift
    needs: changes
    if: needs.changes.outputs.sbe == 'true'
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17 (needed for the SBE generator)
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Download SBE jar
        working-directory: messages
        run: ./scripts/download-sbe-tool.sh

      - name: Regenerate from schema
        working-directory: messages
        run: ./scripts/generate.sh

      - name: Assert no drift
        run: |
          if ! git diff --exit-code -- messages/generated/; then
            echo "::error::messages/generated/ is out of sync with messages/schema/bpt-protocol.xml."
            echo "Run: cd messages && ./scripts/generate.sh   then commit the regenerated files."
            exit 1
          fi

  # ── C++ services via Bazel (primary build) ─────────────────────────────────
  cpp-bazel:
    name: C++ build & test (Bazel)
    needs: changes
    if: needs.changes.outputs.cpp == 'true'
    runs-on: ubuntu-24.04

    steps:
      - uses: actions/checkout@v4

      - name: Set up Bazel with caching
        uses: bazel-contrib/setup-bazel@0.14.0
        with:
          bazelisk-cache: true
          disk-cache: true
          repository-cache: true
          external-cache: true

      - name: Install system deps (openssl headers for Bazel-built targets)
        run: |
          sudo apt-get update -q
          sudo apt-get install -y --no-install-recommends libssl-dev pkg-config

      - name: Bazel build //...
        run: bazel build //...

      - name: Bazel test //...
        run: bazel test //... --test_output=errors

  # ── Backtester via CMake + vcpkg (only service still on CMake) ─────────────
  # Survives because bpt-backtester uses Arrow/Parquet, which don't have a
  # clean Bazel story yet. Narrow path filter — only fires when backtester
  # or its CMake-only transitive deps (top-level CMakeLists, vcpkg.json,
  # messages, yggdrasil) change. Every other service is Bazel-only now.
  cpp-backtester-cmake:
    name: Backtester build & test (CMake)
    needs: changes
    if: needs.changes.outputs.backtester_cmake == 'true'
    runs-on: ubuntu-24.04

    env:
      VCPKG_ROOT: ${{ github.workspace }}/vcpkg
      VCPKG_DEFAULT_BINARY_CACHE: ${{ github.workspace }}/.vcpkg-cache
      # ccache wrapping g++ to skip recompiling unchanged TUs on warm runs.
      # Hit rate for typical PRs is 80-95% — pays back even on a cold cache.
      CCACHE_DIR: ${{ github.workspace }}/.ccache
      CCACHE_MAXSIZE: 1G
      CCACHE_COMPRESS: "true"

    steps:
      - uses: actions/checkout@v4

      - name: Restore vcpkg
        uses: actions/cache@v4
        id: vcpkg-cache
        with:
          path: ${{ env.VCPKG_ROOT }}
          key: vcpkg-${{ runner.os }}-v1

      - name: Restore vcpkg binary packages
        uses: actions/cache@v4
        id: vcpkg-pkgs-cache
        with:
          path: ${{ env.VCPKG_DEFAULT_BINARY_CACHE }}
          key: vcpkg-pkgs-${{ runner.os }}-${{ hashFiles('vcpkg.json') }}
          restore-keys: vcpkg-pkgs-${{ runner.os }}-

      - name: Restore FetchContent (Aeron + fast_float)
        uses: actions/cache@v4
        id: deps-cache
        with:
          path: build/_deps
          key: cmake-deps-${{ runner.os }}-${{ hashFiles('CMakeLists.txt') }}
          restore-keys: cmake-deps-${{ runner.os }}-

      # ccache cache. Keyed on git ref so each branch has its own line, and
      # restore-keys falls back to main's cache for first-build PRs.
      - name: Restore ccache
        uses: actions/cache@v4
        id: ccache-cache
        with:
          path: ${{ env.CCACHE_DIR }}
          key: ccache-${{ runner.os }}-${{ github.ref_name }}-${{ github.sha }}
          restore-keys: |
            ccache-${{ runner.os }}-${{ github.ref_name }}-
            ccache-${{ runner.os }}-main-
            ccache-${{ runner.os }}-

      - name: Install apt dependencies
        run: |
          sudo apt-get update -q
          sudo apt-get install -y --no-install-recommends \
            cmake ninja-build \
            gcc-13 g++-13 \
            ccache \
            libssl-dev pkg-config \
            curl wget

      - name: Install Arrow & Parquet
        run: |
          wget -q https://apache.jfrog.io/artifactory/arrow/ubuntu/apache-arrow-apt-source-latest-noble.deb
          sudo apt-get install -y ./apache-arrow-apt-source-latest-noble.deb
          sudo apt-get update -q
          sudo apt-get install -y libarrow-dev libparquet-dev

      - name: Bootstrap vcpkg
        if: steps.vcpkg-cache.outputs.cache-hit != 'true'
        run: |
          git clone https://github.com/microsoft/vcpkg.git "$VCPKG_ROOT" --depth 1
          "$VCPKG_ROOT/bootstrap-vcpkg.sh" -disableMetrics

      - name: Create vcpkg binary cache dir
        run: mkdir -p "$VCPKG_DEFAULT_BINARY_CACHE"

      # Wrap g++/gcc with ccache via CMake's launcher hook. This applies to
      # the project's compilation but NOT to vcpkg's internal builds (vcpkg
      # has its own binary cache, so the duplication doesn't matter). FetchContent
      # deps DO inherit the launcher, so Aeron/fast_float compile through ccache too.
      - name: Configure
        run: |
          cmake -B build -G Ninja \
            -DCMAKE_BUILD_TYPE=Debug \
            -DCMAKE_C_COMPILER=gcc-13 \
            -DCMAKE_CXX_COMPILER=g++-13 \
            -DCMAKE_C_COMPILER_LAUNCHER=ccache \
            -DCMAKE_CXX_COMPILER_LAUNCHER=ccache \
            -DCMAKE_TOOLCHAIN_FILE="$VCPKG_ROOT/scripts/buildsystems/vcpkg.cmake"

      - name: ccache stats (pre-build)
        run: ccache -s

      - name: Save vcpkg binary packages
        uses: actions/cache/save@v4
        if: always() && steps.vcpkg-pkgs-cache.outputs.cache-hit != 'true'
        with:
          path: ${{ env.VCPKG_DEFAULT_BINARY_CACHE }}
          key: vcpkg-pkgs-${{ runner.os }}-${{ hashFiles('vcpkg.json') }}-${{ github.run_id }}

      - name: Save FetchContent (Aeron + fast_float)
        uses: actions/cache/save@v4
        if: always() && steps.deps-cache.outputs.cache-hit != 'true'
        with:
          path: build/_deps
          key: cmake-deps-${{ runner.os }}-${{ hashFiles('CMakeLists.txt') }}-${{ github.run_id }}

      - name: Build
        run: cmake --build build -j$(nproc)

      - name: Test
        run: ctest --test-dir build --output-on-failure -j$(nproc)

      - name: ccache stats (post-build)
        if: always()
        run: ccache -s

      # Keyed on github.sha so the cache-write is unique per commit (cache@v4's
      # primary key has to be unique to avoid collision); restore falls back
      # to branch + main via restore-keys above.
      - name: Save ccache
        uses: actions/cache/save@v4
        if: always()
        with:
          path: ${{ env.CCACHE_DIR }}
          key: ccache-${{ runner.os }}-${{ github.ref_name }}-${{ github.sha }}

  # ── Aeron media driver (Java / Gradle) ─────────────────────────────────────
  transport:
    name: Transport (Aeron MediaDriver, Java)
    needs: changes
    if: needs.changes.outputs.transport == 'true'
    runs-on: ubuntu-24.04

    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Gradle cache
        uses: gradle/actions/setup-gradle@v3

      - name: Check formatting
        working-directory: transport/aeron
        run: ./gradlew spotlessCheck

      - name: Run tests
        working-directory: transport/aeron
        run: ./gradlew test

      - name: Build shadow JAR
        working-directory: transport/aeron
        run: ./gradlew shadowJar

      - name: Upload JAR artifact
        uses: actions/upload-artifact@v4
        with:
          name: transport-jar
          path: transport/aeron/build/libs/*-all.jar

  # ── Dashboard frontend (TypeScript / Vite) ─────────────────────────────────
  frontend:
    name: Dashboard frontend (lint + build)
    needs: changes
    if: needs.changes.outputs.frontend == 'true'
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: dashboard/frontend

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: dashboard/frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Build (tsc -b + vite build)
        run: npm run build
