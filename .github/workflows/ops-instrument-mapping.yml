name: ops-instrument-mapping

on:
  schedule:
    - cron: "0 4 * * *"   # 04:00 UTC daily
  workflow_dispatch: {}

jobs:
  generate-and-pr:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write

    steps:
      - name: Checkout bpt-core
        uses: actions/checkout@v4

      - name: Set up uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - name: Install bpt-ops
        working-directory: bpt-ops
        run: uv sync

      - name: Run instrument-mapping job
        working-directory: bpt-ops
        run: |
          uv run bpt-ops instrument-mapping \
            --output-dir ../config/instruments \
            --exchange OKX

      - name: Open PR if anything changed
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          cd "$GITHUB_WORKSPACE"
          git config user.name "bpt-ops-bot"
          git config user.email "bpt-ops@users.noreply.github.com"

          if git diff --quiet -- config/instruments; then
            echo "No changes — skipping PR."
            exit 0
          fi

          branch="bpt-ops/instrument-mapping-$(date +%Y%m%d-%H%M%S)"
          git checkout -b "$branch"
          git add config/instruments
          git commit -m "bpt-ops: daily instrument-mapping refresh"
          git push -u origin "$branch"

          gh pr create \
            --title "bpt-ops: daily instrument-mapping refresh" \
            --body "Automated daily refresh from bpt-ops/jobs/instrument_mapping. CI validates schema + diff sanity before merge." \
            --label data-forge \
            --label auto-merge
