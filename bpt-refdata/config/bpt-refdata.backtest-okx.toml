# Instance config — BACKTEST mode, OKX mainnet refdata.
#
# Used when AS-on-OKX-BTC-USDT backtest (testnet has only
# 4 coins). Pulls reference data from HL mainnet REST — read-only, no orders.

# Deployment profile (env + exchange filter). Backtest profile omits
# exchange_config because each service has its own backtest endpoint file.
profile_config = "../deploy/config/profile/backtest-okx.toml"
exchange_config = "config/exchanges/backtest-okx-mainnet.toml"

instrument_poll_interval_s = 3600

# Shared aeron stream registry — see deploy/config/aeron/streams.toml.
aeron_config = "../deploy/config/aeron/streams.toml"

[aeron]
# Fallback only — shared file wins when present.
media_driver_dir = "/dev/shm/aeron-bpt"

[instrument_mapping]
local_path = "/opt/bpt/data/instrument_mapping.json"

[instrument_mapping.sources]
hyperliquid = "../config/instruments/instrument_mapping.hyperliquid.json"

[metrics]
port = 9101

[logging]
level             = "info"
dir               = "logs"
flush_level       = "warn"
flush_interval_ms = 1000
