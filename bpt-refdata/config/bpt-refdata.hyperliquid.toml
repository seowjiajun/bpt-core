# Instance config — LIVE, Hyperliquid mainnet.
# Pairs with scripts/live-hl.sh. Credentials for HL mainnet are loaded
# via exchange_config → config/exchanges/live.toml → secret_name
# "bpt/prod/HYPERLIQUID" (systemd-creds in deployed mode, or
# ~/.bpt-secrets/ locally — see bpt-refdata/config/exchanges/testnet.toml
# header comment for the local loading convention).
environment = "live"
exchange_config = "config/exchanges/live.toml"
exchanges = ["HYPERLIQUID"]
instrument_poll_interval_s = 3600

# Shared aeron stream registry — see deploy/config/aeron/streams.toml.
aeron_config = "../deploy/config/aeron/streams.toml"

[aeron]
# Fallback for deployments where aeron_config isn't readable. Shared
# file wins when present.
media_driver_dir = "/dev/shm/aeron-bpt"

[instrument_mapping]
local_path = "/opt/bpt/data/instrument_mapping.json"

[instrument_mapping.sources]
# Per-exchange mapping files produced by bpt/data-forge (daily). Shipped with
# the deploy tarball under the repo-root config/instruments/ dir. Edit the bpt-ops job to change.
hyperliquid = "../config/instruments/instrument_mapping.hyperliquid.json"

[metrics]
port = 9101

[logging]
level             = "info"
dir               = "logs"
flush_level       = "warn"
flush_interval_ms = 1000
