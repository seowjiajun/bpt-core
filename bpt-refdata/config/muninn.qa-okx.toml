# Instance config — QA environment (demo trading, testnet endpoints).
# Switch to muninn.prod.toml for live trading.
environment = "dev"
exchange_config = "config/exchanges/testnet.toml"
exchanges = ["OKX"]
instrument_poll_interval_s = 3600

[aeron]
media_driver_dir = "/dev/shm/aeron-bpt"

[aeron.snapshot]
channel = "aeron:ipc"
stream_id = 1001    # Muninn → Fenrir (RefDataSnapshot)

[aeron.delta]
channel = "aeron:ipc"
stream_id = 1002    # Muninn → Fenrir (RefDataDelta)

[aeron.control]
channel = "aeron:ipc"
stream_id = 1003    # Fenrir → Muninn (RefDataSubscriptionRequest)

[aeron.fee_schedule]
channel = "aeron:ipc"
stream_id = 1004    # Muninn → Fenrir (FeeSchedule)

[aeron.muninn_status]
channel = "aeron:ipc"
stream_id = 1006    # Muninn → Fenrir (RefDataReady, RefDataError)

[instrument_mapping]
local_path = "/opt/bpt/data/instrument_mapping.json"

[instrument_mapping.sources]
# Per-exchange mapping files produced by bpt/data-forge (daily). Shipped with
# the deploy tarball under the repo-root config/instruments/ dir. Edit the bpt-ops job to change.
okx = "../config/instruments/instrument_mapping.okx.json"

[metrics]
port = 9101

[logging]
level             = "info"
dir               = "logs"
flush_level       = "warn"
flush_interval_ms = 1000
