# Instance config — QA environment, Deribit testnet.
environment = "qa"
exchange_config = "config/exchanges/testnet.toml"
exchanges = ["DERIBIT"]
instrument_poll_interval_s = 3600

[aeron]
media_driver_dir = "/dev/shm/aeron-bifrost"

[aeron.snapshot]
channel = "aeron:ipc"
stream_id = 1001

[aeron.delta]
channel = "aeron:ipc"
stream_id = 1002

[aeron.control]
channel = "aeron:ipc"
stream_id = 1003

[aeron.fee_schedule]
channel = "aeron:ipc"
stream_id = 1004

[aeron.funding_rate]
channel = "aeron:ipc"
stream_id = 1005

[aeron.muninn_status]
channel = "aeron:ipc"
stream_id = 1006

[instrument_mapping]
local_path = "/opt/bpt/data/instrument_mapping.json"

[metrics]
port = 9101

[logging]
level             = "info"
dir               = "logs"
flush_level       = "warn"
flush_interval_ms = 1000
