# Exchange adapter endpoints — TESTNET / demo trading
# Source of truth for testnet exchange connectivity.
# Edit this file when adding a new exchange or changing an endpoint.
# Credentials are loaded from AWS Secrets Manager at startup using secret_name.
# Local dev (BPT_ENV=local): reads ~/.bpt-secrets/<secret_name>.json instead.

[[adapters]]
exchange    = "BINANCE"
secret_name = "bpt/testnet/BINANCE"
rest_host   = "testnet.binance.vision"
rest_port   = "443"
ws_host     = "testnet.binance.vision"
ws_port     = "443"
use_tls     = true

[[adapters]]
exchange    = "OKX"
secret_name = "bpt/testnet/OKX"
simulated   = true
rest_host   = "my.okx.com"
rest_port   = "443"
ws_host     = "wseeapap.okx.com"
ws_port     = "8443"
use_tls     = true

[[adapters]]
exchange    = "HYPERLIQUID"
secret_name = "bpt/testnet/HYPERLIQUID"
rest_host   = "api.hyperliquid-testnet.xyz"
rest_port   = "443"
ws_host     = "api.hyperliquid-testnet.xyz"
ws_port     = "443"
use_tls     = true

