# Instance config — QA environment, Hyperliquid testnet.
# Deployment profile (env + exchange filter + exchange-endpoints path).
profile_config = "../deploy/config/profile/qa-hyperliquid.toml"

instrument_poll_interval_s = 3600

# Shared aeron stream registry. Single source of truth for stream IDs +
# MediaDriver dir across every bpt-* service. Path is relative to this
# service's WorkingDirectory (bpt-core/bpt-refdata).
aeron_config = "../deploy/config/aeron/streams.toml"

[aeron]
# Fallback for deployments where aeron_config isn't readable. If the
# shared file is present, its media_driver_dir wins.
media_driver_dir = "/dev/shm/aeron-bpt"

[instrument_mapping]
local_path = "/opt/bpt/data/instrument_mapping.json"

[instrument_mapping.sources]
# Per-exchange mapping files produced by bpt/data-forge (daily). Shipped with
# the deploy tarball under the repo-root config/instruments/ dir. Edit the bpt-ops job to change.
hyperliquid = "../config/instruments/instrument_mapping.hyperliquid.json"

[metrics]
port = 9101

[logging]
level             = "info"
dir               = "logs"
flush_level       = "warn"
flush_interval_ms = 1000
