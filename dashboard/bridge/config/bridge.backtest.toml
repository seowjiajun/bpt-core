# Dashboard bridge — subscribes to Aeron MD + exec report streams and
# broadcasts JSON messages over WebSocket to the dashboard frontend.

[aeron]
media_driver_dir = "/dev/shm/aeron-bifrost"

[aeron.md_data]
channel   = "aeron:ipc"
stream_id = 2002               # Huginn → everyone (MdMarketData, MdTrade)

[aeron.exec_report]
channel   = "aeron:ipc"
stream_id = 3002               # Heimdall → Fenrir (ExecutionReport)

[ws]
port = 8080

[session]
symbol           = "BTC-USDT"
exchange         = "OKX"
strategy         = "unknown"          # override at runtime via --strategy-name
starting_capital = 100_000.0

[logging]
level = "info"
dir   = "logs"
