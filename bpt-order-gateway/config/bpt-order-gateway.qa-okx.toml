# Instance config — QA environment (demo trading, testnet endpoints).
# Switch to order-gateway.prod.toml for live trading.
# Shared aeron stream registry — see deploy/config/aeron/streams.toml.
# Deployment profile (env + exchange filter + exchange-endpoints path).
profile_config = "../deploy/config/profile/qa-okx.toml"

aeron_config = "../deploy/config/aeron/streams.toml"

[aeron]
# Fallback only — shared file wins when present.
media_driver_dir = "/dev/shm/aeron-bpt"

[order-gateway]
heartbeat_interval_ms = 1000
stale_order_timeout_ms = 30000
refdata_correlation_id = 3001

[order-gateway.risk]
trading_enabled = true
max_order_size_usd = 1000.0
max_notional_per_order_usd = 5000.0
max_open_orders_per_venue = 50
max_orders_per_second = 10
# Latched kill switch: when realized P&L for the UTC day drops below
# this threshold, all subsequent NewOrders reject with RISK_REJECTED.
# Latch is NOT auto-cleared at midnight — operator must restart the
# service after reviewing why we lost that much. 0 disables the check.
# Set small here to exercise the halt on demo-trading fills; raise for
# real use.
max_daily_loss_usd = 50.0
# Pretrade cap on absolute position USD exposure per (exchange, instrument).
# Projected as (current_net_qty + order_dir × order_qty) × order_price.
# 0 disables the check. Set conservative for dev/qa; raise for prod based
# on capital allocation decisions.
max_position_usd = 5000.0
# Exchange-reject-rate circuit breaker. Trips when the fraction of
# post-send REJECTED exec reports over `reject_rate_window_sec` exceeds
# `reject_rate_threshold_pct`, after at least `reject_rate_min_events`
# have landed. On trip: halts trading via the same latch the daily-loss
# kill switch uses — restart required. Intended signal: credentials
# expired, account geo-blocked, margin mode flipped. Pre-trade risk
# rejects don't count (they never reach the exec path). Disabled until
# calibrated on a real venue; uncomment and tune per-env when ready.
# reject_rate_breaker_enabled = true
# reject_rate_threshold_pct   = 20.0
# reject_rate_window_sec      = 60
# reject_rate_min_events      = 10
# Per-adapter disconnect-rate circuit breaker. Halts orders to a specific
# venue when its adapter has reconnected `disconnect_threshold` times in
# the last `disconnect_window_sec`. Only that venue stops accepting
# orders — other adapters keep running. Restart required to clear.
# Intended signal: exchange adapter in a reconnect loop (expired creds,
# geo-block, margin-mode mismatch) where retries just burn rate-limit.
# Disabled by default; enable per-env once reconnect cadence is known.
# disconnect_breaker_enabled = true
# disconnect_threshold       = 5
# disconnect_window_sec      = 60

[metrics]
port = 9103

[logging]
level             = "info"
dir               = "logs"
flush_level       = "warn"
flush_interval_ms = 0
