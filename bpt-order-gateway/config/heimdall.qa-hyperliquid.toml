# Instance config — QA environment, Hyperliquid testnet.
environment = "dev"
exchange_config = "config/exchanges/testnet.toml"
exchanges = ["HYPERLIQUID"]

[aeron]
media_driver_dir = "/dev/shm/aeron-bpt"

[aeron.order]
channel = "aeron:ipc"
stream_id = 3001

[aeron.exec_report]
channel = "aeron:ipc"
stream_id = 3002

[aeron.heartbeat]
channel = "aeron:ipc"
stream_id = 3003

[aeron.account_snapshot]
channel = "aeron:ipc"
stream_id = 3004

[order-gateway]
heartbeat_interval_ms = 1000
stale_order_timeout_ms = 30000
refdata_correlation_id = 3001

[order-gateway.risk]
trading_enabled = true
max_order_size_usd = 500.0
max_notional_per_order_usd = 1000.0
max_open_orders_per_venue = 50
max_orders_per_second = 10

[metrics]
port = 9103

[logging]
level             = "info"
dir               = "logs"
flush_level       = "warn"
flush_interval_ms = 0
