# Instance config — BACKTEST mode
# Order Gateway routes orders to bpt-backtester's local order servers instead of real exchanges.
# Aeron config is identical to QA — Fenrir still sends orders via Aeron as normal.
# Shared aeron stream registry — see deploy/config/aeron/streams.toml.
# Deployment profile (env + exchange filter + exchange-endpoints path).
profile_config = "../deploy/config/profile/backtest-multi.toml"
exchange_config = "config/exchanges/backtest.toml"

aeron_config = "../deploy/config/aeron/streams.toml"

[aeron]
# Fallback only — shared file wins when present.
media_driver_dir = "/dev/shm/aeron-bpt"

[order-gateway]
heartbeat_interval_ms   = 1000
stale_order_timeout_ms  = 30000
refdata_correlation_id  = 3001

[order-gateway.risk]
trading_enabled              = true
max_order_size_usd           = 1000000.0   # High limit for backtesting
max_notional_per_order_usd   = 5000000.0
max_open_orders_per_venue    = 1000
max_orders_per_second        = 10000

[metrics]
port = 9103

[logging]
level             = "debug"
dir               = "logs/backtest"
flush_level       = "warn"
flush_interval_ms = 0
