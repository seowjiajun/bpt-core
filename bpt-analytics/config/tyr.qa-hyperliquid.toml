# Tyr — Toxic Flow Analyzer
# Passive observer: subscribes to exec reports + MD, publishes toxicity scores.
# Does NOT interfere with trading — fenrir optionally subscribes to stream 5001.

environment = "qa"

[aeron]
media_driver_dir = "/dev/shm/aeron-bpt"

[aeron.exec_report]
channel = "aeron:ipc"
stream_id = 3002

[aeron.md_data]
channel = "aeron:ipc"
stream_id = 2002

[aeron.toxicity]
channel = "aeron:ipc"
stream_id = 5001

[tyr]
markout_max_pending   = 64
scorer_window_size    = 50
scorer_min_samples    = 5
publish_interval_ms   = 5000

[logging]
level = "info"
dir   = "logs"

[metrics]
port = 9105
