# Dashboard bridge — subscribes to Aeron MD + exec report streams and
# broadcasts JSON messages over WebSocket to the dashboard frontend.
#
# Bridge has a single TOML reused across all stacks; the per-stack
# `environment` comes from `--profile` (set in the active env file).

# Shared aeron stream registry — see deploy/config/aeron/streams.toml.
# Bridge's systemd unit runs from the repo root, so this resolves directly.
aeron_config = "deploy/config/aeron/streams.toml"

[aeron]
# Fallback only — shared file wins when present.
media_driver_dir = "/dev/shm/aeron-bpt"

[ws]
port = 8080

[session]
symbol   = "BTC-USDT"
exchange = "OKX"
strategy = "unknown"                  # override at runtime via --strategy-name
mode     = "paper"                    # "paper" | "live"; override via --mode
# When set, bridge drops MD ticks and fills for other instruments.  Use when
# bpt-strategy is trading a multi-instrument strategy but you only want one symbol
# on the dashboard.  0 = forward everything (safe for single-instrument runs).
instrument_id = 0

[logging]
level = "info"
dir   = "logs"
