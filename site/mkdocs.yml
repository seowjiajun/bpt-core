site_name: bpt-core
site_description: Production-grade C++ HFT stack — 8 services, sub-microsecond hot paths
site_url: https://bishanparktrading.github.io/bpt-core/
repo_url: https://github.com/bishanparktrading/bpt-core
repo_name: bishanparktrading/bpt-core
edit_uri: edit/main/site/docs/

docs_dir: docs

theme:
  name: material
  palette:
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: black
      accent: indigo
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: black
      accent: indigo
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
  font:
    text: Inter
    code: JetBrains Mono
  features:
    - navigation.instant
    - navigation.tracking
    - navigation.sections
    - navigation.expand
    - navigation.indexes
    - navigation.top
    - search.suggest
    - search.highlight
    - content.code.copy
    - content.code.annotate
    - toc.follow
  icon:
    repo: fontawesome/brands/github

markdown_extensions:
  - admonition
  - attr_list
  - def_list
  - footnotes
  - md_in_html
  - tables
  - toc:
      permalink: true
  - pymdownx.details
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.highlight:
      anchor_linenums: true
      line_spans: __span
      pygments_lang_class: true
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - pymdownx.tasklist:
      custom_checkbox: true
  - pymdownx.emoji:
      emoji_index: !!python/name:material.extensions.emoji.twemoji
      emoji_generator: !!python/name:material.extensions.emoji.to_svg

nav:
  - Home: index.md
  - Architecture: architecture.md
  - Services:
    - services/index.md
    - bpt-md-gateway: services/md-gateway.md
    - bpt-order-gateway: services/order-gateway.md
    - bpt-strategy: services/strategy.md
    - bpt-analytics: services/analytics.md
    - bpt-pricer: services/pricer.md
    - bpt-pms: services/bpt-pms.md
    - bpt-refdata: services/refdata.md
    - bpt-tape: services/tape.md
  - Decisions:
    - decisions/index.md
    - Why Aeron: decisions/aeron.md
    - Hexagonal bus boundaries: decisions/hexagonal-bus.md
    - CRTP on the hot path: decisions/crtp-hot-path.md
    - systemd over Kubernetes: decisions/systemd-over-k8s.md
    - Testnet over paper-mode: decisions/testnet-over-paper.md
  - Operations:
    - ops/index.md
    - Monitoring: ops/monitoring.md
    - Risk: ops/risk.md
    - Deployment: ops/deployment.md
    - Host sleep: ops/host-sleep-recovery.md

extra:
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/bishanparktrading/bpt-core

extra_css:
  - stylesheets/extra.css
