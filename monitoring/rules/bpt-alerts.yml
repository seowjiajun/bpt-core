# PromQL alert rules for the bpt-core stack.
#
# Severity convention:
#   - critical : wake-you-up events — breakers latched, daily-loss hit,
#                process down, strategy halted.  Routed to Discord with no
#                grouping delay.
#   - warning  : notify-but-not-urgent — disconnects, stale data, high
#                latency.  Batched 2-minute windows in Alertmanager.
#
# Every rule includes a `summary` and `description` annotation so the
# Discord message is self-contained — operator doesn't need to grep
# metrics to know what tripped.
#
# Thresholds are tuned to "probably too sensitive initially" on purpose —
# easier to loosen one that fires on normal noise than to miss a real
# incident.  Dial each one in after a week of observation.

groups:

  # ─────────────── CRITICAL ──────────────────────────────────────────
  - name: bpt-critical
    interval: 15s
    rules:

      - alert: ServiceDown
        # Prometheus' built-in `up` metric is 0 when a scrape fails.
        # 30s of scrape failures (2 intervals) before we cry wolf.
        expr: up == 0
        for: 30s
        labels:
          severity: critical
        annotations:
          summary: "{{ $labels.job }} is DOWN"
          description: |
            Scrape target {{ $labels.instance }} (job {{ $labels.job }})
            has been unreachable for 30s.  Either the process is dead,
            the metrics port is wrong, or systemd is mid-restart.
            Check `systemctl --user status {{ $labels.job }}` and
            `journalctl --user -u {{ $labels.job }} -n 50`.

      - alert: DailyLossLatchTripped
        # One-shot latch — fires the instant it flips to 1, stays firing
        # until operator restarts the service (which clears the latch).
        expr: order_gateway_daily_loss_latched == 1
        for: 0s
        labels:
          severity: critical
        annotations:
          summary: "Daily-loss kill switch LATCHED"
          description: |
            PnlTracker has tripped the daily-loss kill switch.  All new
            orders are being rejected by RiskChecker.  The latch does
            NOT auto-clear at midnight — operator must review the day's
            activity and restart bpt-order-gateway to resume trading.

      - alert: RejectRateBreakerTripped
        expr: order_gateway_reject_rate_breaker_tripped == 1
        for: 0s
        labels:
          severity: critical
        annotations:
          summary: "Global reject-rate breaker TRIPPED"
          description: |
            Share of REJECTED exec reports over the rolling window
            exceeded the configured threshold.  `RiskChecker.trading_enabled`
            flipped to false — ALL new orders rejected venue-wide until
            operator restart.  Likely cause: exchange auth problem,
            unfunded account, or systematic config error.

      - alert: DisconnectRateBreakerTripped
        expr: order_gateway_disconnect_breaker_tripped == 1
        for: 0s
        labels:
          severity: critical
        annotations:
          summary: "Disconnect-rate breaker TRIPPED ({{ $labels.exchange }})"
          description: |
            Adapter for {{ $labels.exchange }} reconnected more times in
            the rolling window than the disconnect_threshold.  Adapter
            is halted — new orders to this venue rejected with
            EXCHANGE_ERROR.  Other venues continue trading normally.
            Operator restart required to resume.

      - alert: ValidationDropBreakerTripped
        expr: bpt_md_gateway_validation_drop_breaker_tripped == 1
        for: 0s
        labels:
          severity: critical
        annotations:
          summary: "MD validation-drop breaker TRIPPED ({{ $labels.exchange }})"
          description: |
            ValidatingPublisher for {{ $labels.exchange }} has stopped
            forwarding MD to Aeron — validation drop ratio exceeded
            threshold over the rolling window.  Downstream (strategy)
            sees no data from this venue rather than bad data.  Cause
            is usually a schema change or symbol-universe drift.
            Operator restart required to resume.

      - alert: StrategyHalted
        expr: strategy_trading_halted == 1
        for: 0s
        labels:
          severity: critical
        annotations:
          summary: "Strategy HALTED (dashboard kill-switch)"
          description: |
            The strategy's dashboard kill-switch has been engaged.
            Trading is paused via the control stream — no quotes, no
            new orders.  Auto-recovery is intentionally disabled here;
            operator must un-halt from the dashboard.

  # ─────────────── WARNING ───────────────────────────────────────────
  - name: bpt-warning
    interval: 15s
    rules:

      - alert: AdapterDisconnected
        # Both md-gw and order-gw expose exchange_connected gauges.
        # 30s of sustained disconnect — transient reconnect blips shouldn't page.
        expr: |
          (bpt_md_gateway_exchange_connected == 0)
          or (order_gateway_exchange_connected == 0)
        for: 30s
        labels:
          severity: warning
        annotations:
          summary: "Adapter disconnected: {{ $labels.exchange }} ({{ $labels.job }})"
          description: |
            {{ $labels.job }} has been disconnected from {{ $labels.exchange }}
            for >30s.  Normal reconnects complete in 5-10s, so this
            indicates a sustained outage — exchange downtime, WS
            endpoint moved, or local network issue.  Check
            `journalctl --user -u {{ $labels.job }} -n 100 | grep {{ $labels.exchange }}`.

      - alert: AccountSnapshotStale
        # time() returns unix seconds; the gauge carries unix ns. Divide.
        # 60s without any snapshot = order-gateway isn't publishing them,
        # which usually means its REST polling thread died.
        expr: |
          (time() - (strategy_account_snapshot_last_recv_ns / 1e9)) > 60
          and strategy_account_snapshot_last_recv_ns > 0
        for: 0s
        labels:
          severity: warning
        annotations:
          summary: "AccountSnapshot stale for {{ $labels.exchange }}"
          description: |
            Strategy hasn't received an AccountSnapshot from {{ $labels.exchange }}
            in >60s.  Position reconciliation is blind; shutdown-flatten
            will fall back to PositionTracker (strategy-side).  Likely
            cause: order-gateway's periodic snapshot publisher stuck or
            the REST endpoint is throwing.

      - alert: StrategyPaused
        expr: strategy_trading_paused == 1
        for: 10s
        labels:
          severity: warning
        annotations:
          summary: "Strategy trading is paused"
          description: |
            Strategy has paused trading — either a dependency heartbeat
            (MD-gateway or OrderGateway) went stale, or an internal
            watchdog fired.  Check `strategy_trading_paused` label set
            and journalctl for the pause reason.

      - alert: StrategyPausedForRefdata
        # Strategy noticed refdata heartbeat stale and stopped emitting
        # new quotes (graceful degradation). Distinct from RefdataStale
        # below — this fires only when the strategy SIDE detected and
        # reacted, confirming the breaker tripped end-to-end. Trading
        # is safely paused, not in trouble — warning only, no critical
        # page.
        expr: strategy_refdata_stale == 1
        for: 30s
        labels:
          severity: warning
        annotations:
          summary: "Strategy paused for stale refdata"
          description: |
            Strategy has paused new quotes because bpt-refdata's
            heartbeat aged past the configured threshold (default 25s,
            5× heartbeat cadence).  Cancels of resting orders still
            flow.  Quoting auto-resumes when refdata recovers.  Check
            RefdataStale alert + journalctl --user -u bpt-refdata.

      - alert: MDGatewayQuiet
        # Rate of publish counter over 1 min. Zero for 60s is "nothing
        # going through" — either reconnecting (covered by AdapterDisconnected)
        # or a decoder is wedged.
        expr: rate(bpt_md_gateway_md_messages_published_total[1m]) == 0
        for: 60s
        labels:
          severity: warning
        annotations:
          summary: "MD Gateway is silent ({{ $labels.exchange }})"
          description: |
            No MD messages published for {{ $labels.exchange }} in the
            last minute.  If AdapterDisconnected isn't also firing, the
            adapter is connected but the decoder is stuck — probably a
            schema drift or a parser exception path. `journalctl --user
            -u bpt-md-gateway -n 200 | grep {{ $labels.exchange }}`.

      - alert: RefdataStale
        expr: (time() - (refdata_last_update_ns / 1e9)) > 300
        for: 0s
        labels:
          severity: warning
        annotations:
          summary: "Refdata pipeline stale"
          description: |
            Refdata hasn't published a snapshot or delta in >5 min.
            Downstream (strategy) is running on a frozen instrument
            cache — delists / new listings invisible.  Check
            `bpt-refdata` scrape target and journalctl.

      - alert: ReconciliationDivergence
        # increase() over 5m catches any new drift; rearms after the
        # strategy/exchange views reconcile.
        expr: increase(strategy_reconciliation_divergences_total[5m]) > 0
        for: 0s
        labels:
          severity: warning
        annotations:
          summary: "Strategy ↔ exchange position divergence observed"
          description: |
            Reconciliation against the most recent AccountSnapshot
            found a divergence between the strategy-side PositionTracker
            and the exchange's reported positions.  Full instrument /
            symbol / qty detail is in the WARN logs ("RECONCILIATION
            DIVERGENCE ...").  Likely causes: dropped fill event,
            scale bug, or manual intervention on the exchange.

      - alert: HighLatencyP99
        # Tick-to-strategy p99 > 500µs for a sustained window.
        # Buckets in the histogram are roughly: 1µs, 5µs, ..., 500ms, 1s.
        # 5e5 ns = 500µs. Adjust after baselining.
        expr: |
          histogram_quantile(0.99, rate(strategy_tick_to_strategy_ns_bucket[5m])) > 5e5
        for: 2m
        labels:
          severity: warning
        annotations:
          summary: "Strategy tick->callback p99 latency high ({{ $value | humanize }}ns)"
          description: |
            P99 latency of MD-tick → strategy callback has been above
            500µs for 2 minutes.  Not fatal, but likely either CPU
            contention (unpinned thread, missing isolcpus) or a slow
            path in the strategy (refdata lookup hot-path, logging at
            trace level, etc.).  Check `top -H -p $(pgrep -f bpt-strat)`.

  # ─────────────── TAPE (recording host) ────────────────────────────
  - name: bpt-tape
    interval: 30s
    rules:

      - alert: TapeWriterStale
        # The flagship alert: bpt-tape's last successful wslog write was
        # more than 5min ago. Would have caught the 2026-05-09 ENOSPC
        # incident at minute zero instead of 36 hours later. Per-venue
        # so a quiet REST poll (hourly) doesn't drag the WS check.
        # `time() - gauge` works because the gauge holds a unix-epoch
        # value, not a duration. Threshold 300s = 5 min.
        expr: time() - bpt_tape_last_wslog_write_unix_seconds > 300
        for: 0s
        labels:
          severity: critical
        annotations:
          summary: "bpt-tape writer stale on {{ $labels.venue }} ({{ $value | humanizeDuration }})"
          description: |
            No successful wslog write on venue {{ $labels.venue }} for
            {{ $value | humanizeDuration }}. The recorder process may
            be alive but stuck — check `journalctl --user -u bpt-tape`
            and /opt/bpt/data/raw/{{ $labels.venue }}/ for missing date
            dirs or empty files. Disk-full was the root cause on
            2026-05-09; `df -h /opt/bpt/data` first.

      - alert: TapeRotationFailure
        # Counter goes up only when ensure_file_open() can't mkdir or
        # fopen the next wslog. After T81 the recorder also aborts on
        # this path (the abort is the durable signal); the metric
        # increment is best-effort and may be lost on the abort race,
        # but if it lands it's a free heads-up.
        expr: increase(bpt_tape_wslog_rotation_failures_total[5m]) > 0
        for: 0s
        labels:
          severity: critical
        annotations:
          summary: "bpt-tape rotation failure on {{ $labels.venue }} (cause={{ $labels.cause }})"
          description: |
            Tape::ensure_file_open() failed with cause={{ $labels.cause }}.
            The recorder will abort + restart; investigate why mkdir/fopen
            failed. ENOSPC, EACCES, EROFS are the usual suspects. The
            journal will have the errno in the [E] log line.

      - alert: TapeDataRateRegression
        # Sustained data-rate drop > 75% vs the prior hour suggests the
        # WS subscriptions have shrunk or fallen behind. Compare the
        # current 5-min rate to the rate observed an hour ago. Both
        # sides must be > 0 so a fresh start with no offset history
        # doesn't auto-fire.
        expr: |
          (
            rate(bpt_tape_bytes_written_total[5m]) > 0 and
            rate(bpt_tape_bytes_written_total[5m] offset 1h) > 0 and
            rate(bpt_tape_bytes_written_total[5m]) <
              0.25 * rate(bpt_tape_bytes_written_total[5m] offset 1h)
          )
        for: 10m
        labels:
          severity: warning
        annotations:
          summary: "bpt-tape data rate dropped on {{ $labels.venue }} (now {{ $value | humanize }} B/s)"
          description: |
            Data rate on {{ $labels.venue }} is below 25% of an hour ago
            for the past 10 minutes. Either the universe shrank, an
            upstream feed went quiet, or we're silently dropping frames.
            Cross-check against the venue status page and
            bpt_tape_frames_written_total.

      - alert: TapeProcessDown
        # `up` is Prometheus' built-in scrape gauge — 0 if scrape failed.
        # absent(bpt_tape_healthy) covers the case where scrape succeeds
        # but the metric is gone (process re-launched without metrics
        # somehow). 60s `for:` dampens the natural up=0 blip during a
        # Restart=always recycle, which lasts ~5s.
        expr: up{job="bpt-tape"} == 0 or absent(bpt_tape_healthy)
        for: 60s
        labels:
          severity: critical
        annotations:
          summary: "bpt-tape process is not reachable"
          description: |
            Prometheus scrape of bpt-tape has been failing for 60s, OR
            the bpt_tape_healthy gauge has gone away. A Restart=always
            cycle would clear in ~5s; sustained means the process is in
            a crash loop or systemd has hit StartLimitBurst. Check
            `systemctl --user status bpt-tape` on tape-hl-tokyo-01 and
            `journalctl --user -u bpt-tape -n 100`.

      - alert: TapeWsFlapping
        # ws_reconnects_total counts (re)connects including bootstrap.
        # rate over 5m of > 1 per minute = >5 reconnects in 5min = the
        # WS is flapping. HL's normal ~10min graceful close cycle yields
        # one reconnect per 10min = ~0.1/min; threshold 1/min has 10x
        # headroom. Distinguishes "occasional reconnect (normal)" from
        # "venue API is unstable (warn)".
        expr: rate(bpt_tape_ws_reconnects_total{job="bpt-tape"}[5m]) * 60 > 1
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "bpt-tape WS flapping on {{ $labels.venue }} ({{ $value | humanize }} reconnects/min)"
          description: |
            WebSocket connection to {{ $labels.venue }} is reconnecting
            faster than once per minute, sustained for 5 minutes. Either
            the venue API is degraded or our WS keepalive logic is
            misaligned with the venue's session-lifetime expectations.
            Check journalctl for "WS_DISCONNECT" markers and the venue's
            status page.

      - alert: TapeSubscriptionsLow
        # Catches universe-config regressions. The 230-perp HL universe
        # is the operational target; threshold 50 is the floor between
        # "tape is on a meaningful subset" and "tape is operating on a
        # tiny test universe by mistake" (the earlier 12-instrument
        # state would fire this).
        expr: bpt_tape_subscriptions{job="bpt-tape"} < 50
        for: 2m
        labels:
          severity: warning
        annotations:
          summary: "bpt-tape subscription count low on {{ $labels.venue }} ({{ $value }} instruments)"
          description: |
            Recorder is subscribed to fewer than 50 instruments on
            {{ $labels.venue }}. A correctly-configured HL recorder
            should have ~229 (full PERP universe minus BTC). A drop
            indicates either a config regression (universe filter
            tightened, mapping shrunk) or a startup race where the
            mapping hadn't fully loaded.
