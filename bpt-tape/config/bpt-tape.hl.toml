# bpt-tape — HL MAINNET RECORDING config.
#
# Records real Hyperliquid mainnet ticks to /opt/bpt/data/raw/hyperliquid/.
# Read-only (passive subscriber, no orders) so it's safe to point at
# mainnet even when the trading stack is on testnet.
#
# Universe selection: derived dynamically from the canonical
# instrument_mapping.json. bpt-tape loads the file at boot, walks it
# per venue, filters by inst_types + exclude_bases, and subscribes to
# every survivor. Adding/removing recording symbols becomes an edit to
# the mapping JSON (which bpt-ops fetchers maintain), not this TOML.

environment = "dev"
calibrate_tsc = false  # skip the ~2s TSC calibration on a smoke test

# Top-level keys must come BEFORE any [section] / [[array]] header — TOML's
# scoping rule is "a key after a section header belongs to that section."
# All root-level Settings fields therefore land here.

recording_universe_venues = ["HYPERLIQUID"]

# Path to the canonical instrument_mapping.json. Same file bpt-refdata
# reads on the trading host; here it's the source of truth for what
# bpt-tape subscribes to. Absolute path because the systemd unit's
# WorkingDirectory is $BPT_ROOT/bpt-tape, but instrument JSONs live
# under $BPT_ROOT/current/share/instruments/ in deploy mode. For
# laptop dev runs, override via a local config copy.
instrument_mapping_path = "/opt/bpt/current/share/instruments/instrument_mapping.hyperliquid.json"

# No [aeron] block — bpt-tape passes connect_aeron=false to bpt::app::run
# (see main.cpp). Venue WS frames go straight to disk via Tape; nothing
# publishes SBE; the recording host runs zero Aeron infrastructure.

# Inline adapter list (bpt-tape accepts either [[adapters]] inline or
# exchange_config indirection — same shape as bpt-md-gateway's loader).
[[adapters]]
exchange = "HYPERLIQUID"
ws_host = "api.hyperliquid.xyz"
ws_port = "443"
ws_path = "/ws"
use_tls = true
ws_connect_timeout_ms = 30000
ws_ping_interval_ms = 20000
ws_read_timeout_ms = 5000
ws_liveness_timeout_ms = 60000
max_price_deviation_pct = 0.0  # disable validator on the recorder
io_thread_cpu = -1

[universe_filter]
# Only record perps. Spot/futures live on different venues; HL is perp-only
# so this is mostly defensive (and self-documenting).
inst_types = ["PERP"]
# BTC excluded because spread on HL mainnet is too tight for AS to clear
# fees. Other venues might want this filter list venue-specific later.
exclude_bases = ["BTC"]
default_depth = 5

[recording]
output_dir = "/opt/bpt/data/raw"
# 10-min rotation (was 3600): a file isn't eligible for S3 sync until it
# rotates closed, so rotation — not sync cadence — gates the off-host loss
# window. 600s + 5-min sync + 2-min min-age ⇒ worst-case loss ~17 min vs ~1h.
# Cost: ~144 files/venue/day (~70 MB each), more S3 PUTs. Acceptable.
rotate_interval_seconds = 600
fsync_interval_ms = 1000
buffer_bytes = 1048576

[metrics]
# 0.0.0.0 so the same-VPC monitoring host (terraform module
# infra/terraform/monitoring-host) can scrape over the private IP. The
# tape-host security group restricts ingress on 9111 to the monitor
# host's SG, so this is not publicly reachable. Don't change to
# 127.0.0.1 in any environment that has an in-VPC scraper.
host = "0.0.0.0"
# 9110 is bpt-transport (Aeron MediaDriver) — different host in prod, but
# the same monitoring stack scrapes both, so they need disjoint ports.
# bpt-tape at 9111; trading hosts at 9110.
port = 9111

[logging]
level = "info"
dir = "logs"
flush_level = "warn"
flush_interval_ms = 1000

# Refdata REST capture. One tape per exchange (path:
# /opt/bpt/data/raw/hyperliquid-rest/...) — separate from the WS tape so
# the WS converter never sees these records. Body envelope is
# `u8 method | u16 target_len | target | body` (see Tape::RecordType
# REST_RESPONSE). HL uses POST /info with a JSON body discriminator;
# enumerated explicitly here so the recorder's surface is decoupled from
# bpt-refdata's adapter code.
[[refdata_endpoints]]
exchange = "HYPERLIQUID"
host = "api.hyperliquid.xyz"
port = "443"
use_tls = true
method = "POST"
path = "/info"
body = '{"type":"meta"}'
interval_seconds = 3600

[[refdata_endpoints]]
exchange = "HYPERLIQUID"
host = "api.hyperliquid.xyz"
port = "443"
use_tls = true
method = "POST"
path = "/info"
body = '{"type":"spotMeta"}'
interval_seconds = 3600
